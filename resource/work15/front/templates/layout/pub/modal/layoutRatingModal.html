<div role="dialog" class="popup-wrap" id="layoutRatingModal">
  <div class="popup-dim"></div>
  <div class="popup-cont">
    <div class="popup-header">만족도 조사</div>
    <div class="popup-body">

      <div class="layout-column gap-xl">
        <p>레이아웃 서비스에 대한 만족도를 평가해 주세요.<br>소중한 의견은 서비스 개선에 반영됩니다.</p>

        <div class="layout-column gap-2xs items-start">
          <p class="text-title required">만족도 평가</p>

          <div class="rating-wrap">
            <input type="radio" id="star11" name="rating" value="1">
            <label for="star11"></label>
            <input type="radio" id="star12" name="rating" value="2">
            <label for="star12"></label>
            <input type="radio" id="star13" name="rating" value="3">
            <label for="star13"></label>
            <input type="radio" id="star14" name="rating" value="4">
            <label for="star14"></label>
            <input type="radio" id="star15" name="rating" value="5">
            <label for="star15"></label>
          </div>
        </div>

        <div class="form-group">
          <label for="form01" class="text-label">추가 의견 (선택)</label>
          <div class="form-box textarea border-active">
            <textarea name="" id="form01" placeholder="서비스 개선을 위한 의견을 자유롭게 작성해 주세요." title="추가 의견(선택) 입력"></textarea>
            <span class="counter">(0/1,000)</span>
          </div>
        </div>
      </div>
    </div>
    <div class="popup-footer btn-full">
      <button type="button" class="btn line close-btn">나중에 하기</button>
      <button type="button" class="btn dark">완료하고 닫기</button>
    </div>
  </div>
</div>
