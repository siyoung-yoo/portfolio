<html lang="ko" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{common/layout/default.html}">
<body>

<th:block layout:fragment="contents">
  <div id="bodyContent" class="register-page">
    <div class="title-area flex-col">
      <h2 class="page-title" id="pageTitle">레이아웃 서비스 신청</h2>
      <p class="page-description" id="pageDescription">기존 도면, 신규 도면 서비스 신청</p>
    </div>
    <!-- // .title-area -->

    <form id="applyForm" onsubmit="return false;">
      <div class="layout-column gap-2xl">
        <!-- 신청명 -->
        <div class="form-group">
          <label for="reqTitle" class="text-label required">신청명</label>
          <div class="form-box">
            <input type="text" id="reqTitle" name="reqTitle" maxlength="50" autocomplete="off" placeholder="ex. 2026년 LG전자 가산캠퍼스 12층 리뉴얼 건" title="신청명 입력">
          </div>
          <p class="text-error">필수 항목입니다</p>
        </div>

        <!-- 목적 -->
        <div class="form-group">
          <p class="text-label required">목적 (중복 선택 가능)</p>
          <div class="form-box">
            <div class="list-inline gap-lg">
              <div class="form-chk">
                <input type="checkbox" name="purpose" id="purposeNew" value="NEW">
                <label for="purposeNew">신규 공간 구축</label>
              </div>
              <div class="form-chk">
                <input type="checkbox" name="purpose" id="purposeChange" value="CHANGE">
                <label for="purposeChange">기존 공간 변경</label>
              </div>
              <div class="form-chk">
                <input type="checkbox" name="purpose" id="purposeEtc" value="ETC">
                <label for="purposeEtc">기타</label>
              </div>
            </div>
          </div>
          <p class="text-error">필수 항목입니다</p>
        </div>

        <!-- 도면 등록 -->
        <div class="layout-column gap-sm">
          <div class="form-group">
            <label for="fileUpload" class="text-label required">도면 등록</label>

            <div class="form-box file-upload-area">
              <div class="form-desc">
                <div class="icon-area"><i class="icon-upload"></i></div>
                <p class="font-md">DWG, PDF 및 기타 참고 자료 업로드</p>
                <div class="font-sm text-medium-gray mt-3xs">100mb 이하의 파일만 업로드 가능합니다.</div>
              </div>

              <div class="file-upload">
                <input type="file" id="fileUpload" class="file-input" accept=".pdf,.dwg,.dxf,.png,.jpg,.jpeg" hidden multiple>
                <label for="fileUpload" class="btn dark"><i class="icon-plus"></i>파일 업로드</label>
              </div>
            </div>
            <p class="text-error">필수 항목입니다</p>
          </div>

          <div class="btn-area" id="btnSelectLayoutWrap">
            <button type="button" class="btn line round" id="btnOpenLayoutSelect"><i class="icon-plus"></i>기존 도면에서 추가</button>
          </div>

          <!-- 기존 도면 선택 인라인 영역 -->
          <div class="box-line-style type-file-select fade hidden" id="layoutSelectWrap">
            <div class="header">
              <p class="text-title"><i class="icon-check"></i>기존 도면에서 추가</p>
              <button type="button" class="btn-close" id="btnCloseLayoutSelect"><span class="sr-only">기존 도면 선택 영역 닫기</span></button>
            </div>

            <div class="cont">
              <div class="title-area">
                <p class="text-title">도면을 선택해 주세요.</p>
              </div>

              <div class="layout-flex">
                <div class="select-box bg-invert w-55" id="layoutAddrSelect">
                  <button type="button" class="btn-select" title="주소 선택">주소</button>
                  <div class="option-list">
                    <div class="scroll-y" id="layoutAddrOptions"></div>
                  </div>
                </div>
                <div class="select-box bg-invert" id="layoutNmSelect">
                  <button type="button" class="btn-select" title="세부 장소 선택">세부 장소</button>
                  <div class="option-list">
                    <div class="scroll-y" id="layoutNmOptions"></div>
                  </div>
                </div>
              </div>

              <p class="font-sm mt-xs">* 선택 시 최신 버전 도면이 자동으로 추가됩니다.</p>
            </div>
          </div>

          <!-- 등록된 파일 리스트 -->
          <div class="box-line-style type-file-list fade hidden" id="fileListWrap">
            <p class="font-sm">업로드 파일 <strong id="fileCount">0</strong>개</p>
            <div id="fileItemList"></div>
          </div>
        </div>

        <!-- 요청내용 -->
        <div class="form-group">
          <label for="content" class="text-label">내용 (선택)</label>
          <div class="form-box textarea">
            <textarea name="content" id="content" maxlength="1000" placeholder="요청 내용을 자유롭게 작성해 주세요." title="요청 내용 입력"></textarea>
            <span class="counter"><span id="contentCounter">0</span>/1,000</span>
          </div>
        </div>

        <!-- 대리점 선택 -->
        <div class="layout-column gap-sm">
          <div class="form-group">
            <p class="text-label required">대리점 선택</p>
            <div class="form-box">
              <div class="list-inline gap-lg">
                <div class="form-chk">
                  <input type="radio" name="vndAssignType" id="vndExisting" value="EXISTING">
                  <label for="vndExisting">기존 대리점</label>
                </div>
                <div class="form-chk">
                  <input type="radio" name="vndAssignType" id="vndNew" value="NEW">
                  <label for="vndNew">신규 대리점 배정 요청</label>
                </div>
              </div>
            </div>
            <p class="text-error">필수 항목입니다</p>
          </div>

          <!-- 기존 대리점 선택 시 -->
          <div class="form-group fade hidden" data-content="existing">
            <div class="select-box" id="vndSelectBox">
              <button type="button" class="btn-select" title="기존 대리점 선택">기존 대리점 선택</button>
              <div class="option-list">
                <div class="scroll-y" id="vndOptionList"></div>
              </div>
            </div>
            <input type="hidden" id="vndCd" name="vndCd">
            <input type="hidden" id="vndNm" name="vndNm">
            <p class="text-error">필수 항목입니다</p>
          </div>

          <!-- 신규 대리점 선택 시 -->
          <div class="form-group fade hidden" data-content="new">
            <label for="newVndAssignReason" class="text-label">신규 대리점 요청 사유 (선택)</label>
            <div class="form-box textarea">
              <textarea name="newVndAssignReason" id="newVndAssignReason" maxlength="1000" placeholder="요청 사유를 자유롭게 작성해 주세요." title="신규 대리점 요청 사유 입력"></textarea>
              <span class="counter"><span id="reasonCounter">0</span>/1,000</span>
            </div>
          </div>
        </div>
      </div>
    </form>

    <div class="footer-btn-area">
      <button type="button" class="btn line lg" id="btnCancel">취소</button>
      <button type="button" class="btn dark lg" id="btnSubmit">신청하기</button>
    </div>
  </div>

</th:block>

<th:block layout:fragment="script">
<script>
  /* global alertPopup */

  const MAX_SIZE = 100 * 1024 * 1024;
  const ALLOWED_EXT = ['pdf', 'dwg', 'dxf', 'png', 'jpg', 'jpeg'];

  /**
   * registeredLayouts 항목:
   *  - { type: 'file',     file: File, desc, name }                          신규 업로드 파일 (저장 시 /floorplan/upload)
   *  - { type: 'search',   filePath, fileNm, desc, name }                    기존 도면에서 추가 (저장 시 /floorplan/uploadByPath)
   *  - { type: 'existing', id: OJ_LAYOUT_FLOOR_PLAN_ID, filePath, fileNm, desc, name }   수정 모드에서 이미 DB에 등록된 도면 (삭제 시 즉시 /floorplan/delete)
   */
  const registeredLayouts = [];

  const EDIT_REQ_NO = new URLSearchParams(location.search).get('edit') || '';
  const isEditMode = !!EDIT_REQ_NO;
  let editingRequestId = null;

  document.addEventListener('DOMContentLoaded', function () {
    initFileUpload();
    initVendorRadio();
    initLayoutSelectToggle();
    initCounters();
    initFooterButtons();
    loadVendorOptions();
    loadLayoutOptions();
    if (isEditMode) initEditMode();
  });

  /* =====================================================================
   *  수정 모드 진입
   * ===================================================================== */
  async function initEditMode() {
    document.getElementById('pageTitle').textContent = '레이아웃 서비스 수정';
    document.getElementById('pageDescription').textContent = '신청 내용 수정';
    document.getElementById('btnSubmit').textContent = '수정하기';
    await loadExistingData(EDIT_REQ_NO);
  }

  async function loadExistingData(reqNo) {
    const fd = new FormData();
    fd.append('ojLayoutServiceNumber', reqNo);

    try {
      const res = await fetch('/layout/service/detail', { method: 'POST', body: fd });
      if (!res.ok) {
        const msg = '신청 정보 조회에 실패했습니다.';
        alertPopup ? alertPopup(msg) : alert(msg);
        return;
      }
      const { data } = await res.json();
      if (!data || !data.length) {
        const goList = () => { location.href = '/layout/service'; };
        const msg = '해당 신청건을 찾을 수 없습니다.';
        alertPopup ? alertPopup(msg, goList) : (alert(msg), goList());
        return;
      }

      const main = data[0];

      if (main.SERVICE_STATUS !== 'NOT-ASSIGNED' && main.SERVICE_STATUS !== 'REQUEST') {
        const goDetail = () => { location.href = '/layout/service/' + encodeURIComponent(reqNo); };
        const msg = '해당 신청건은 수정할 수 없는 상태입니다.';
        alertPopup ? alertPopup(msg, goDetail) : (alert(msg), goDetail());
        return;
      }

      editingRequestId = main.OJ_LAYOUT_SERVICE_REQUEST_ID;
      fillForm(main);
      fillFloorPlans(data);
    } catch (e) {
      console.error(e);
      const msg = '신청 정보 조회 중 오류가 발생했습니다.';
      alertPopup ? alertPopup(msg) : alert(msg);
    }
  }

  function fillForm(main) {
    document.getElementById('reqTitle').value = main.REQ_TITLE || '';

    if (main.NEW_SECTION_BUILD_YN === 'Y') document.getElementById('purposeNew').checked = true;
    if (main.OLD_SECTION_CHANGE_YN === 'Y') document.getElementById('purposeChange').checked = true;
    if (main.ETC_YN === 'Y') document.getElementById('purposeEtc').checked = true;

    const content = main.REQUEST_CONTENT || '';
    document.getElementById('content').value = content;
    document.getElementById('contentCounter').textContent = String(content.length);

    if (main.VND_ASSIGN_TYPE === 'EXISTING') {
      const r = document.getElementById('vndExisting');
      r.checked = true;
      r.dispatchEvent(new Event('change'));
      document.getElementById('vndCd').value = main.COM_VND_CD || '';
      document.getElementById('vndNm').value = main.COM_VND_NM || '';
      syncVendorSelected();
    } else if (main.VND_ASSIGN_TYPE === 'NEW') {
      const r = document.getElementById('vndNew');
      r.checked = true;
      r.dispatchEvent(new Event('change'));
      const reason = main.NEW_VND_ASSIGN_REASON || '';
      document.getElementById('newVndAssignReason').value = reason;
      document.getElementById('reasonCounter').textContent = String(reason.length);
    }
  }

  function fillFloorPlans(rows) {
    const plans = rows.filter(r => r.OJ_LAYOUT_FLOOR_PLAN_ID);
    plans.forEach(r => {
      registeredLayouts.push({
        type: 'existing',
        newYn: r.FLOOR_PLAN_NEW_YN,            // 'Y' 신규 업로드 / 'N' 기존 도면에서 추가
        id: r.OJ_LAYOUT_FLOOR_PLAN_ID,
        filePath: r.FLOOR_PLAN_FILE_PATH,
        fileNm: r.FLOOR_PLAN_FILE_NM,
        name: r.FLOOR_PLAN_FILE_NM,
        desc: r.FLOOR_PLAN_MEMO || ''
      });
    });
    renderFileList();
  }

  /* =====================================================================
   *  파일 업로드 (드래그 & 드롭 + 파일 선택)
   * ===================================================================== */
  function initFileUpload() {
    const dropZone = document.querySelector('.file-upload-area');
    const fileInput = document.getElementById('fileUpload');

    dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('dragover'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
    dropZone.addEventListener('drop', (e) => {
      e.preventDefault();
      dropZone.classList.remove('dragover');
      handleFiles(e.dataTransfer.files);
    });

    fileInput.addEventListener('change', () => {
      handleFiles(fileInput.files);
      fileInput.value = '';
    });
  }

  function handleFiles(fileList) {
    [...fileList].forEach(file => {
      if (file.size > MAX_SIZE) {
        alertPopup ? alertPopup('파일 용량이 100MB를 초과합니다.') : alert('파일 용량이 100MB를 초과합니다.');
        return;
      }
      if (!isAllowedExtension(file.name)) {
        const msg = '허용하지 않는 파일 형식입니다.\n(pdf, dwg, dxf, png, jpg, jpeg 만 등록 가능합니다.)';
        alertPopup ? alertPopup(msg) : alert(msg);
        return;
      }
      registeredLayouts.push({ type: 'file', file, desc: '', name: file.name });
    });
    renderFileList();
  }

  function isAllowedExtension(name) {
    const dot = name.lastIndexOf('.');
    if (dot < 0) return false;
    return ALLOWED_EXT.includes(name.substring(dot + 1).toLowerCase());
  }

  function renderFileList() {
    const wrap = document.getElementById('fileListWrap');
    const list = document.getElementById('fileItemList');
    document.getElementById('fileCount').textContent = String(registeredLayouts.length);

    if (!registeredLayouts.length) {
      wrap.classList.add('hidden');
      list.innerHTML = '';
      return;
    }
    wrap.classList.remove('hidden');

    list.innerHTML = registeredLayouts.map((item, idx) => {
      // "기존" 뱃지: 이번 신청에서 "기존 도면에서 추가"한 건(type='search')
      //            + 수정 모드에서 NEW_YN='N' 으로 저장돼 있던 건(type='existing' && newYn='N')
      const isFromExisting = item.type === 'search' || (item.type === 'existing' && item.newYn === 'N');
      const badge = isFromExisting ? '<span class="badge square sm">기존</span>' : '';
      const descReadonly = item.type === 'existing' ? 'readonly' : '';
      return `
      <div class="box-style type-attached-file">
        <div class="header">
          <div class="list-inline flex-nowrap">
            <p class="text-title font-regular">
              <i class="icon-attach"></i>
              <span class="ellipsis-line2">${escapeHtml(item.name)}</span>
            </p>
            ${badge}
          </div>
          <button type="button" class="btn-close-sm" data-idx="${idx}"><span class="sr-only">파일 삭제</span></button>
        </div>
        <div class="cont">
          <div class="form-group">
            <label class="text-label font-sm">파일 설명 (선택)</label>
            <div class="form-box">
              <input type="text" data-desc="${idx}" value="${escapeHtml(item.desc || '')}" ${descReadonly}
                     autocomplete="off" placeholder="이 파일의 용도나 해당 공간을 입력해 주세요. ex. 본사 6층">
            </div>
          </div>
        </div>
      </div>`;
    }).join('');

    list.querySelectorAll('.btn-close-sm').forEach(btn => {
      btn.addEventListener('click', async () => {
        const idx = parseInt(btn.dataset.idx, 10);
        const item = registeredLayouts[idx];
        if (!item) return;

        // 이미 DB 에 저장된 도면은 즉시 삭제 API 호출
        if (item.type === 'existing' && item.id) {
          const fd = new FormData();
          fd.append('ojLayoutFloorPlanId', item.id);
          try {
            const res = await fetch('/layout/service/floorplan/delete', { method: 'POST', body: fd });
            if (!res.ok) {
              const msg = '도면 파일 삭제에 실패했습니다.\n' + (await res.text());
              alertPopup ? alertPopup(msg) : alert(msg);
              return;
            }
          } catch (e) {
            console.error(e);
            const msg = '도면 파일 삭제 중 오류가 발생했습니다.';
            alertPopup ? alertPopup(msg) : alert(msg);
            return;
          }
        }
        registeredLayouts.splice(idx, 1);
        renderFileList();
      });
    });
    list.querySelectorAll('input[data-desc]').forEach(inp => {
      inp.addEventListener('input', () => {
        const i = parseInt(inp.dataset.desc, 10);
        if (registeredLayouts[i]) registeredLayouts[i].desc = inp.value;
      });
    });
  }

  /* =====================================================================
   *  대리점 라디오 (기존 / 신규)
   * ===================================================================== */
  function initVendorRadio() {
    document.querySelectorAll('input[name="vndAssignType"]').forEach(radio => {
      radio.addEventListener('change', function () {
        const existing = document.querySelector('[data-content="existing"]');
        const isNew = document.querySelector('[data-content="new"]');
        if (this.value === 'EXISTING') {
          existing?.classList.remove('hidden');
          isNew?.classList.add('hidden');
        } else {
          existing?.classList.add('hidden');
          isNew?.classList.remove('hidden');
          document.getElementById('vndCd').value = '';
          document.getElementById('vndNm').value = '';
          const btn = document.querySelector('#vndSelectBox .btn-select');
          btn.textContent = '기존 대리점 선택';
          delete btn.dataset.value;
          document.querySelectorAll('#vndOptionList button').forEach(b => b.classList.remove('selected'));
        }
      });
    });
  }

  /* =====================================================================
   *  기존 도면 선택 인라인 영역 토글
   * ===================================================================== */
  function initLayoutSelectToggle() {
    document.getElementById('btnOpenLayoutSelect').addEventListener('click', openLayoutSelectArea);
    document.getElementById('btnCloseLayoutSelect').addEventListener('click', closeLayoutSelectArea);
  }

  /* =====================================================================
   *  대리점 옵션 로드 (select-box)
   * ===================================================================== */
  let vendorLoaded = false;

  async function loadVendorOptions() {
    if (vendorLoaded) return;
    try {
      const res = await fetch('/layout/service/vendor/search', { method: 'POST', body: new FormData() });
      if (!res.ok) return;
      const { data } = await res.json();
      const rows = (data || [])
        .map(r => ({ cd: r.vndCd ?? r.VND_CD ?? '', nm: r.vndNm ?? r.VND_NM ?? '' }))
        .filter(r => r.cd && r.nm.trim());
      vendorLoaded = true;
      renderVendorOptions(rows);
      syncVendorSelected();
    } catch (e) { console.error(e); }
  }

  function renderVendorOptions(rows) {
    const list = document.getElementById('vndOptionList');
    list.innerHTML = rows.map(r =>
      `<button type="button" data-value="${escapeHtml(r.cd)}" data-nm="${escapeHtml(r.nm)}">${escapeHtml(r.nm)}</button>`
    ).join('');

    list.querySelectorAll('button').forEach(btn => {
      btn.addEventListener('click', () => {
        document.getElementById('vndCd').value = btn.dataset.value;
        document.getElementById('vndNm').value = btn.dataset.nm;
      });
    });
  }

  // 수정 모드 등에서 vndCd 가 이미 설정된 상태일 때, 해당 옵션을 selected 표시 + btn-select 텍스트 반영
  function syncVendorSelected() {
    const cd = document.getElementById('vndCd').value;
    const nm = document.getElementById('vndNm').value;
    if (!cd) return;

    const list = document.getElementById('vndOptionList');
    list.querySelectorAll('button').forEach(b => b.classList.remove('selected'));
    const target = list.querySelector(`button[data-value="${cd}"]`);
    if (target) target.classList.add('selected');

    const btn = document.querySelector('#vndSelectBox .btn-select');
    if (nm) {
      btn.textContent = nm;
      btn.dataset.value = cd;
    }
  }

  /* =====================================================================
   *  기존 도면 인라인 선택 (주소 → 세부 장소)
   *  · 페이지 진입 시 도면 목록 fetch → ADR4 단위로 그룹핑
   *  · 주소 옵션 클릭 → 해당 주소의 도면(LAYOUT_NM + FILE_TYPE) 옵션을 두번째 select 에 채움
   *  · 세부 장소 옵션 클릭 → registeredLayouts 에 push 후 인라인 영역 닫기
   * ===================================================================== */
  let layoutLoaded = false;
  let layoutAddrMap = {}; // { adr4 -> [row, ...] }

  function openLayoutSelectArea() {
    document.getElementById('btnSelectLayoutWrap').classList.add('hidden');
    document.getElementById('layoutSelectWrap').classList.remove('hidden');
  }

  function closeLayoutSelectArea() {
    document.getElementById('btnSelectLayoutWrap').classList.remove('hidden');
    document.getElementById('layoutSelectWrap').classList.add('hidden');
    resetLayoutSelectBoxes();
  }

  function resetLayoutSelectBoxes() {
    const addrBtn = document.querySelector('#layoutAddrSelect .btn-select');
    addrBtn.textContent = '주소';
    delete addrBtn.dataset.value;
    document.querySelectorAll('#layoutAddrOptions button').forEach(b => b.classList.remove('selected'));

    const nmBtn = document.querySelector('#layoutNmSelect .btn-select');
    nmBtn.textContent = '세부 장소';
    delete nmBtn.dataset.value;
    document.getElementById('layoutNmOptions').innerHTML = '';
  }

  async function loadLayoutOptions() {
    if (layoutLoaded) return;
    try {
      const res = await fetch('/layout/service/floorplan/search', { method: 'POST', body: new FormData() });
      if (!res.ok) return;
      const { data } = await res.json();
      const rows = (data || []).filter(r => {
        const adr = r.adr4 ?? r.ADR4 ?? '';
        const nm = r.layoutNm ?? r.LAYOUT_NM ?? '';
        return String(adr).trim() && String(nm).trim();
      });
      layoutAddrMap = {};
      rows.forEach(r => {
        const adr = r.adr4 ?? r.ADR4;
        if (!layoutAddrMap[adr]) layoutAddrMap[adr] = [];
        layoutAddrMap[adr].push(r);
      });
      layoutLoaded = true;
      renderLayoutAddrOptions();
    } catch (e) { console.error(e); }
  }

  function renderLayoutAddrOptions() {
    const list = document.getElementById('layoutAddrOptions');
    const addrs = Object.keys(layoutAddrMap).sort();
    list.innerHTML = addrs.map(adr =>
      `<button type="button" data-value="${escapeHtml(adr)}">${escapeHtml(adr)}</button>`
    ).join('');
    list.querySelectorAll('button').forEach(btn => {
      btn.addEventListener('click', () => onAddrSelected(btn.dataset.value));
    });
  }

  function onAddrSelected(adr) {
    // 새 주소 선택 시 세부 장소 select 초기화
    const nmBtn = document.querySelector('#layoutNmSelect .btn-select');
    nmBtn.textContent = '세부 장소';
    delete nmBtn.dataset.value;

    const list = document.getElementById('layoutNmOptions');
    const rows = layoutAddrMap[adr] || [];
    list.innerHTML = rows.map((r, i) => {
      const nm = r.layoutNm ?? r.LAYOUT_NM ?? '';
      const ft = r.fileType ?? r.FILE_TYPE ?? '';
      const label = ft ? `${nm} (${ft})` : nm;
      return `<button type="button" data-idx="${i}">${escapeHtml(label)}</button>`;
    }).join('');

    list.querySelectorAll('button').forEach((b, i) => {
      b.addEventListener('click', () => onLayoutSelected(rows[i]));
    });
  }

  function onLayoutSelected(row) {
    const filePath = row.filePath ?? row.FILE_PATH ?? '';
    const fileNm = row.fileNm ?? row.FILE_NM ?? '';
    const layoutNm = row.layoutNm ?? row.LAYOUT_NM ?? '';
    const fileType = row.fileType ?? row.FILE_TYPE ?? '';

    if (!filePath) {
      const msg = '해당 도면의 파일 경로가 없습니다.';
      alertPopup ? alertPopup(msg) : alert(msg);
      return;
    }

    registeredLayouts.push({
      type: 'search',
      filePath,
      fileNm,
      name: fileNm || (layoutNm + (fileType ? '.' + fileType.toLowerCase() : '')),
      desc: ''
    });
    renderFileList();
    closeLayoutSelectArea();
  }

  /* =====================================================================
   *  글자수 카운터
   * ===================================================================== */
  function initCounters() {
    bindCounter('content', 'contentCounter');
    bindCounter('newVndAssignReason', 'reasonCounter');
  }
  function bindCounter(textareaId, counterId) {
    const ta = document.getElementById(textareaId);
    const c = document.getElementById(counterId);
    if (!ta || !c) return;
    ta.addEventListener('input', () => { c.textContent = String(ta.value.length); });
  }

  /* =====================================================================
   *  Footer 버튼 (취소 / 신청)
   * ===================================================================== */
  function initFooterButtons() {
    document.getElementById('btnCancel').addEventListener('click', () => {
      location.href = isEditMode
        ? '/layout/service/' + encodeURIComponent(EDIT_REQ_NO)
        : '/layout/service';
    });
    document.getElementById('btnSubmit').addEventListener('click', submitApplication);
  }

  async function submitApplication() {
    if (!validate()) return;

    // 1단계: 메인 정보 저장 — 신청(/apply) 또는 수정(/update)
    const fd = new FormData();
    fd.append('reqTitle', document.getElementById('reqTitle').value.trim());
    fd.append('content', document.getElementById('content').value);

    const purposes = [...document.querySelectorAll('input[name="purpose"]:checked')].map(i => i.value);
    fd.append('purpose', purposes.join(','));

    const vndAssignType = document.querySelector('input[name="vndAssignType"]:checked').value;
    fd.append('vndAssignType', vndAssignType);
    if (vndAssignType === 'EXISTING') {
      fd.append('vndCd', document.getElementById('vndCd').value);
      fd.append('vndNm', document.getElementById('vndNm').value);
    } else {
      fd.append('newVndAssignReason', document.getElementById('newVndAssignReason').value);
    }

    let id;
    if (isEditMode) {
      fd.append('ojLayoutServiceRequestId', editingRequestId);
      try {
        const res = await fetch('/layout/service/update', { method: 'POST', body: fd });
        if (!res.ok) {
          const msg = '수정에 실패했습니다.\n' + (await res.text());
          alertPopup ? alertPopup(msg) : alert(msg);
          return;
        }
        id = editingRequestId;
      } catch (e) {
        console.error(e);
        const msg = '수정 중 오류가 발생했습니다.';
        alertPopup ? alertPopup(msg) : alert(msg);
        return;
      }
    } else {
      try {
        const res = await fetch('/layout/service/apply', { method: 'POST', body: fd });
        if (!res.ok) {
          const msg = '신청 저장에 실패했습니다.\n' + (await res.text());
          alertPopup ? alertPopup(msg) : alert(msg);
          return;
        }
        const body = await res.json();
        id = body.ojLayoutServiceRequestId;
        if (id == null) {
          const msg = '신청 ID 를 받지 못했습니다. 관리자에게 문의해 주세요.';
          alertPopup ? alertPopup(msg) : alert(msg);
          return;
        }
      } catch (e) {
        console.error(e);
        alertPopup ? alertPopup('신청 저장 중 오류가 발생했습니다.') : alert('신청 저장 중 오류가 발생했습니다.');
        return;
      }
    }

    // 2단계: 신규 파일 업로드 (existing 은 이미 DB 에 있으므로 제외)
    const uploadFailures = [];
    for (const item of registeredLayouts.filter(x => x.type === 'file' && x.file)) {
      const ufd = new FormData();
      ufd.append('ojLayoutServiceRequestId', id);
      ufd.append('file', item.file);
      ufd.append('memo', item.desc || '');
      try {
        const res = await fetch('/layout/service/floorplan/upload', { method: 'POST', body: ufd });
        if (!res.ok) {
          const text = await res.text();
          console.error('파일 업로드 실패:', item.name, res.status, text);
          uploadFailures.push(item.name + ' (' + res.status + ')');
        }
      } catch (e) {
        console.error('파일 업로드 실패:', item.name, e);
        uploadFailures.push(item.name + ' (네트워크 오류)');
      }
    }

    // 3단계: 기존 도면 등록 (S3 경로만 저장)
    for (const item of registeredLayouts.filter(x => x.type === 'search' && x.filePath)) {
      const params = new URLSearchParams();
      params.append('ojLayoutServiceRequestId', id);
      params.append('filePath', item.filePath);
      params.append('fileName', item.fileNm || item.name);
      params.append('memo', item.desc || '');
      try {
        const res = await fetch('/layout/service/floorplan/uploadByPath', {
          method: 'POST',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded; charset=UTF-8' },
          body: params.toString()
        });
        if (!res.ok) {
          const text = await res.text();
          console.error('기존 도면 등록 실패:', item.name, res.status, text);
          uploadFailures.push(item.name + ' (' + res.status + ')');
        }
      } catch (e) {
        console.error('기존 도면 등록 실패:', item.name, e);
        uploadFailures.push(item.name + ' (네트워크 오류)');
      }
    }

    if (uploadFailures.length) {
      const msg = '다음 도면 파일 등록에 실패했습니다:\n - ' + uploadFailures.join('\n - ')
                + '\n\n신청은 저장되었으니 상세에서 다시 등록해 주세요.';
      alertPopup ? alertPopup(msg) : alert(msg);
    }

    if (isEditMode) {
      const goDetail = () => { location.href = '/layout/service/' + encodeURIComponent(EDIT_REQ_NO); };
      const msg = '수정이 완료되었습니다.';
      alertPopup ? alertPopup(msg, goDetail) : (alert(msg), goDetail());
    } else {
      const goList = () => { location.href = '/layout/service'; };
      if (alertPopup) {
        alertPopup('서비스 신청이 완료되었습니다.', '서비스 현황 조회에서<br>진행 상태를 확인하실 수 있습니다.', null, goList);
      } else {
        alert('서비스 신청이 완료되었습니다.');
        goList();
      }
    }
  }

  function validate() {
    let ok = true;
    clearErrors();

    // 신청명
    const reqTitle = document.getElementById('reqTitle');
    if (!reqTitle.value.trim()) { setError(reqTitle); ok = false; }

    // 목적
    const anyPurpose = !![...document.querySelectorAll('input[name="purpose"]:checked')].length;
    if (!anyPurpose) { setError(document.getElementById('purposeNew')); ok = false; }

    // 도면 1개 이상
    if (!registeredLayouts.length) { setError(document.getElementById('fileUpload')); ok = false; }

    // 대리점 라디오
    const vndType = document.querySelector('input[name="vndAssignType"]:checked');
    if (!vndType) { setError(document.getElementById('vndExisting')); ok = false; }
    else if (vndType.value === 'EXISTING' && !document.getElementById('vndCd').value) {
      document.getElementById('vndSelectBox').classList.add('error'); ok = false;
    }

    if (!ok && alertPopup) alertPopup('필수 항목을 입력해 주세요.');
    return ok;
  }

  function setError(el) {
    const target = el?.closest('.form-box') || el?.closest('.select-box');
    target?.classList.add('error');
  }
  function clearErrors() {
    document.querySelectorAll('.form-box.error, .select-box.error').forEach(b => b.classList.remove('error'));
  }

  function escapeHtml(s) {
    if (s == null) return '';
    return String(s)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
  }
</script>
</th:block>
</body>
