<html lang="ko" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{common/layout/default.html}">
<body>

<th:block layout:fragment="contents">
  <div id="bodyContent">
    <div class="title-area flex-col">
      <h2 class="page-title">레이아웃 서비스</h2>
      <p class="page-description">서비스 신청 현황 조회</p>
    </div>
    <!-- // .title-area -->

    <div class="btn-area justify-end">
      <button type="button" class="btn dark lg" id="btnGoApply">서비스 신청하기</button>
    </div>
    <!-- // .btn-area -->

    <div class="search-area">
      <div class="row">
        <div class="form-group">
          <label for="searchKeyword" class="text-label">검색</label>
          <div class="form-box">
            <i class="icon-search"></i>
            <input type="text" id="searchKeyword" autocomplete="off" placeholder="신청번호, 신청명, 신청자" title="신청번호, 신청명, 신청자 입력">
          </div>
        </div>

        <div class="form-group w-md">
          <label for="searchVndNm" class="text-label">진행 대리점</label>
          <div class="form-box">
            <input type="text" id="searchVndNm" autocomplete="off" placeholder="진행 대리점" title="진행 대리점 입력">
          </div>
        </div>

        <div class="form-group w-sm">
          <label for="searchStatus" class="text-label">진행 상태</label>
          <div class="select-box" data-name="status">
            <button type="button" id="searchStatus" class="btn-select" title="진행 상태 선택" data-value="">전체</button>
            <div class="option-list">
              <div class="scroll-y">
                <button type="button" class="selected" data-value="">전체</button>
                <button type="button" data-value="REQUEST">신청</button>
                <button type="button" data-value="ACCEPT">접수</button>
                <button type="button" data-value="IN-PROGRESS">진행</button>
                <button type="button" data-value="COMPLETE">완료</button>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="row">
        <div class="form-group w-lg">
          <label for="fromDt" class="text-label">신청일자</label>
          <div class="range-picker">
            <div class="form-box">
              <input type="text" id="fromDt" class="start-date" autocomplete="off" placeholder="연도.월.일" title="신청일자 시작 날짜 선택">
            </div>
            <span class="text-mid">~</span>
            <div class="form-box">
              <input type="text" id="endDt" class="end-date" autocomplete="off" placeholder="연도.월.일" title="신청일자 종료 날짜 선택">
            </div>
          </div>
        </div>

        <div class="btn-area">
          <button type="button" class="btn dark" id="btnSearch">검색</button>
          <button type="button" class="btn line" id="btnReset"><i class="icon-refresh"></i>초기화</button>
        </div>
      </div>
    </div>
    <!-- // search-area -->

    <div class="table-utils">
      <p class="table-info">전체 <strong id="totalCount">0</strong>건</p>
    </div>

    <div class="text-nodata" id="noDataArea" style="display:none;">검색 내역이 존재하지 않습니다.</div>

    <div class="table-wrap" id="tableArea">
      <table class="is-selectable">
        <colgroup>
          <col style="width: 170px">
          <col>
          <col style="width: 160px">
          <col style="width: 120px">
          <col style="width: 90px">
          <col style="width: 120px">
          <col style="width: 120px">
        </colgroup>
        <thead>
          <tr>
            <th scope="col">신청번호</th>
            <th scope="col">신청명</th>
            <th scope="col">진행 대리점</th>
            <th scope="col">신청자</th>
            <th scope="col" class="text-center">진행 상태</th>
            <th scope="col" class="text-center">신청일자</th>
            <th scope="col" class="text-center">최종 업로드일</th>
          </tr>
        </thead>
        <tbody id="serviceListBody"></tbody>
      </table>
    </div>

  </div>
</th:block>

<th:block layout:fragment="script">
<script th:inline="javascript">
  /* global alertPopup */

  /** 백엔드 SERVICE_STATUS → 화면 배지 */
  const STATUS_BADGE = {
    'NOT-ASSIGNED': { text: '신청', cls: 'badge-line-orange w-fix' },
    'REQUEST'     : { text: '신청', cls: 'badge-line-orange w-fix' },
    'ACCEPT'      : { text: '접수', cls: 'badge-line-green  w-fix' },
    'IN-PROGRESS' : { text: '진행', cls: 'badge-line-blue   w-fix' },
    'COMPLETE'    : { text: '완료', cls: 'badge bg-light-gray w-fix' }
  };

  document.addEventListener('DOMContentLoaded', function () {
    document.getElementById('btnGoApply').addEventListener('click', () => {
      location.href = '/layout/service/apply';
    });
    document.getElementById('btnSearch').addEventListener('click', loadList);
    document.getElementById('btnReset').addEventListener('click', resetSearch);

    ['searchKeyword', 'searchVndNm'].forEach(id => {
      document.getElementById(id).addEventListener('keydown', (e) => {
        if (e.key === 'Enter') { e.preventDefault(); loadList(); }
      });
    });

    bindStatusSelect();

    loadList();
  });

  /** 진행 상태 select-box (퍼블 컴포넌트와 호환) */
  function bindStatusSelect() {
    const box = document.querySelector('.select-box[data-name="status"]');
    if (!box) return;
    const trigger = box.querySelector('.btn-select');
    box.querySelectorAll('.option-list button').forEach(btn => {
      btn.addEventListener('click', () => {
        box.querySelectorAll('.option-list button').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        trigger.textContent = btn.textContent;
        trigger.dataset.value = btn.dataset.value || '';
      });
    });
  }

  function getSelectedStatus() {
    const trigger = document.querySelector('.select-box[data-name="status"] .btn-select');
    return trigger ? (trigger.dataset.value || '') : '';
  }

  function normalizeDate(v) {
    if (!v) return '';
    return v.replaceAll('.', '-');
  }

  async function loadList() {
    const formData = new FormData();
    formData.append('status', getSelectedStatus());
    formData.append('fromDt', normalizeDate(document.getElementById('fromDt').value));
    formData.append('endDt',  normalizeDate(document.getElementById('endDt').value));
    formData.append('searchKeyword', document.getElementById('searchKeyword').value.trim());

    try {
      const res = await fetch('/layout/service/list', { method: 'POST', body: formData });
      if (!res.ok) {
        alertPopup ? alertPopup('목록 조회 중 오류가 발생했습니다.') : alert('목록 조회 중 오류가 발생했습니다.');
        return;
      }
      const { data } = await res.json();
      renderTable(filterByVendor(data || []));
    } catch (e) {
      console.error(e);
      alertPopup ? alertPopup('목록 조회 중 오류가 발생했습니다.') : alert('목록 조회 중 오류가 발생했습니다.');
    }
  }

  /** 진행 대리점 input 은 클라이언트 사이드 필터링 */
  function filterByVendor(rows) {
    const v = document.getElementById('searchVndNm').value.trim().toLowerCase();
    if (!v) return rows;
    return rows.filter(r => (r.COM_VND_NM || '').toLowerCase().includes(v));
  }

  function renderTable(rows) {
    const tbody = document.getElementById('serviceListBody');
    const noData = document.getElementById('noDataArea');
    const tableArea = document.getElementById('tableArea');
    document.getElementById('totalCount').textContent = String(rows.length);

    if (!rows.length) {
      tbody.innerHTML = '';
      noData.style.display = '';
      tableArea.style.display = 'none';
      return;
    }
    noData.style.display = 'none';
    tableArea.style.display = '';

    const userNm = /*[[${session.OJ_NM}]]*/ '';
    tbody.innerHTML = rows.map(r => {
      const badge = STATUS_BADGE[r.SERVICE_STATUS] || { text: r.SERVICE_STATUS || '-', cls: 'badge bg-light-gray w-fix' };
      const vndNm = r.COM_VND_NM || (r.VND_ASSIGN_TYPE === 'NEW' ? '<span class="text-medium-gray">배정 대기</span>' : '-');
      return `
        <tr data-req-no="${escapeHtml(r.REQ_NO)}" style="cursor:pointer;">
          <td>${escapeHtml(r.REQ_NO)}</td>
          <td class="row-title">${escapeHtml(r.REQ_TITLE || '')}</td>
          <td>${vndNm}</td>
          <td>${escapeHtml(userNm)}</td>
          <td class="text-center"><span class="${badge.cls}">${badge.text}</span></td>
          <td class="text-center">${escapeHtml(r.REQ_DATE || '')}</td>
          <td class="text-center">${escapeHtml(r.UPD_SYS_DT || '')}</td>
        </tr>`;
    }).join('');

    tbody.querySelectorAll('tr').forEach(tr => {
      tr.addEventListener('click', () => {
        location.href = '/layout/service/' + encodeURIComponent(tr.dataset.reqNo);
      });
    });
  }

  function resetSearch() {
    document.getElementById('searchKeyword').value = '';
    document.getElementById('searchVndNm').value = '';
    document.getElementById('fromDt').value = '';
    document.getElementById('endDt').value = '';
    const trigger = document.querySelector('.select-box[data-name="status"] .btn-select');
    if (trigger) {
      trigger.textContent = '전체';
      trigger.dataset.value = '';
    }
    document.querySelectorAll('.select-box[data-name="status"] .option-list button')
      .forEach((b, i) => b.classList.toggle('selected', i === 0));
    loadList();
  }

  function escapeHtml(s) {
    if (s == null) return '';
    return String(s)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
  }
</script>
</th:block>
</body>
</html>
