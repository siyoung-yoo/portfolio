<!-- custom-modal -->
<template id="custom-modal">
  <div role="dialog" class="popup-wrap">
    <div class="popup-dim"></div>
    <div class="popup-cont">
      <div class="popup-header"></div>
      <div class="popup-body"></div>
      <div class="popup-footer">
        <button type="button" class="btn line _cancel-btn">취소</button>
        <button type="button" class="btn dark _confirm-btn">확인</button>
      </div>
    </div>
  </div>
</template>

<!-- custom-alert (alert) -->
<template id="custom-alert">
  <div role="alertdialog" class="popup-alert">
    <div class="alert-cont">
      <p class="alert-title"></p>
      <p class="alert-text"></p>
      <div class="alert-footer">
        <button type="button" class="btn dark _confirm-btn">확인</button>
      </div>
    </div>
  </div>
</template>

<!-- custom-alert (confirm) -->
<template id="custom-confirm">
  <div role="alertdialog" class="popup-alert">
    <div class="alert-cont">
      <p class="alert-title"></p>
      <p class="alert-text"></p>
      <div class="alert-footer">
        <button type="button" class="btn line _cancel-btn">취소</button>
        <button type="button" class="btn dark _confirm-btn">확인</button>
      </div>
    </div>
  </div>
</template>

<!-- custom-select -->
<template id="custom-select">
  <div class="select-box">
    <button type="button" class="btn-select" title="선택"></button>
    <div class="option-list">
      <div class="scroll-y"></div>
    </div>
  </div>
</template>

<!-- custom-input -->
<template id="custom-input">
  <div class="form-group">
    <label class="text-label"></label>
    <div class="form-box">
      <input type="text" autocomplete="off" title="입력">
    </div>
    <p class="text-error"></p>
  </div>
</template>

<!-- custom-textarea -->
<template id="custom-textarea">
  <div class="form-group">
    <label class="text-label"></label>
    <div class="form-box textarea">
      <textarea title="입력"></textarea>
      <span class="counter"></span>
    </div>
  </div>
</template>

<!-- custom-table (default / selectable) -->
<template id="custom-table">
  <div>
    <div class="table-utils">
      <p class="table-info"></p>
    </div>
    <div class="table-wrap">
      <table>
        <colgroup></colgroup>
        <thead></thead>
        <tbody></tbody>
      </table>
    </div>
    <div class="text-nodata" style="display:none;"></div>
    <div class="pagination" style="display:none;">
      <button type="button" class="prev" aria-label="이전 페이지"></button>
      <div class="page-link"></div>
      <button type="button" class="next" aria-label="다음 페이지"></button>
    </div>
  </div>
</template>

<!-- custom-table (simple / simple-reverse) -->
<template id="custom-table-simple">
  <table>
    <colgroup></colgroup>
    <thead></thead>
    <tbody></tbody>
  </table>
</template>

<!-- custom-table (toggle) -->
<template id="custom-table-toggle">
  <div class="table-toggle">
    <button type="button" class="btn-toggle"></button>
    <div class="table-wrap">
      <table>
        <colgroup></colgroup>
        <thead></thead>
        <tbody></tbody>
      </table>
    </div>
  </div>
</template>

<!-- custom-radio / custom-checkbox -->
<template id="custom-check">
  <div class="form-chk">
    <input>
    <label></label>
  </div>
</template>

<!-- custom-datepicker (single) -->
<template id="custom-datepicker">
  <div>
    <label class="text-label"></label>
    <div class="form-box date-picker">
      <input type="text" class="single-date" autocomplete="off" placeholder="연도.월.일" title="날짜 입력">
    </div>
  </div>
</template>

<!-- custom-datepicker (range) -->
<template id="custom-daterange">
  <div>
    <label class="text-label"></label>
    <div class="range-picker">
      <div class="form-box">
        <input type="text" class="start-date" autocomplete="off" placeholder="연도.월.일" title="시작 날짜 입력">
      </div>
      <span class="text-mid">~</span>
      <div class="form-box">
        <input type="text" class="end-date" autocomplete="off" placeholder="연도.월.일" title="종료 날짜 입력">
      </div>
    </div>
  </div>
</template>

<!-- custom-tab -->
<template id="custom-tab">
  <div>
    <ul class="tab-list"></ul>
    <div class="tab-contents"></div>
  </div>
</template>

<!-- custom-search -->
<template id="custom-search">
  <div class="search-area"></div>
</template>

<!-- custom-search row -->
<template id="custom-search-row">
  <div class="row"></div>
</template>

<!-- custom-search btn-area -->
<template id="custom-search-btnarea">
  <div class="btn-area">
    <button type="button" class="btn dark _search-btn">검색</button>
    <button type="button" class="btn line _reset-btn"><i class="icon-refresh"></i>초기화</button>
  </div>
</template>
