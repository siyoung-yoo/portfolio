<html lang="ko" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{common/layout/default.html}">
<body class="bg-white">

<th:block layout:fragment="contents">
  <div id="bodyContent" class="my-page">
    <div class="title-area">
      <h2 class="page-title">마이페이지</h2>
    </div>
    <!-- // .title-area -->

    <!--
      [개인정보 가드 — 사내기준 6.2]
      본인확인 모달 통과 전에는 회원정보 영역이 보이지 않는다.
      이 영역은 verifyPrivacyModal 의 확인이 통과될 때 hidden 이 해제된다.
    -->
    <div id="mypageContent" class="hidden">

      <!-- S: 회원 정보 -->
      <div class="title-area justify-between mb-lg">
        <h3 class="group-title">회원 정보</h3>
        <button type="button" class="btn dark px-sm" id="btnMemberEdit">수정</button>

        <div class="btn-area hidden" id="memberActionArea">
          <button type="button" class="btn line px-sm" id="btnMemberCancel">취소</button>
          <button type="button" class="btn dark px-sm" id="btnMemberSave">저장</button>
        </div>
      </div>

      <div class="layout-column gap-sm" id="memberForm">
        <div class="form-group">
          <label for="memberName" class="text-label">이름</label>
          <div class="form-box" id="memberNameBox">
            <input type="text" id="memberName" autocomplete="off" placeholder="이름 입력" title="이름 입력" readonly>
          </div>
          <p class="text-error hidden" id="memberNameError">필수 항목입니다.</p>
        </div>

        <div class="form-group">
          <label for="memberPhone" class="text-label">연락처</label>
          <div class="form-box" id="memberPhoneBox">
            <input type="text" id="memberPhone" autocomplete="off" placeholder="숫자만 입력" title="연락처 입력" readonly>
          </div>
          <p class="text-error hidden" id="memberPhoneError">올바른 형식이 아닙니다.</p>
        </div>

        <div class="form-group">
          <label for="memberEmail" class="text-label">이메일</label>
          <div class="form-box" id="memberEmailBox">
            <input type="text" id="memberEmail" autocomplete="off" placeholder="ID@email.com" title="이메일 입력" readonly>
          </div>
          <p class="text-error hidden" id="memberEmailError">올바른 형식이 아닙니다.</p>
        </div>
      </div>
      <!-- E: 회원 정보 -->

      <div class="divider-dash only-line"><hr class="solid-line text-gray"></div>

      <!-- S: 비밀번호 -->
      <div class="title-area justify-between mb-lg">
        <h3 class="group-title">비밀번호</h3>
        <button type="button" class="btn line" id="btnPwEdit">비밀번호 변경</button>

        <div class="btn-area hidden" id="pwActionArea">
          <button type="button" class="btn line px-sm" id="btnPwCancel">취소</button>
          <button type="button" class="btn dark px-sm" id="btnPwSave">저장</button>
        </div>
      </div>

      <div class="layout-column gap-sm hidden" id="pwForm">
        <div class="form-group">
          <label for="currentPw" class="text-label required">현재 비밀번호</label>
          <div class="form-box" id="currentPwBox">
            <input type="password" id="currentPw" autocomplete="off" placeholder="비밀번호 입력" title="비밀번호 입력">
          </div>
          <p class="text-error hidden" id="currentPwError">현재 비밀번호를 입력해 주세요.</p>
        </div>

        <div class="form-group">
          <label for="newPw" class="text-label required">새 비밀번호</label>
          <div class="form-box" id="newPwBox">
            <input type="password" id="newPw" autocomplete="off" placeholder="새 비밀번호 입력">
          </div>
          <ul class="form-hint-list" id="newPwHints">
            <li data-hint="length"><i class="icon"></i>8-15자</li>
            <li data-hint="upper"><i class="icon"></i>영문 대/소문자</li>
            <li data-hint="digit"><i class="icon"></i>숫자</li>
            <li data-hint="special"><i class="icon"></i>특수문자</li>
          </ul>
          <p class="text-error hidden" id="newPwError">3가지 이상 조합이 필요합니다.</p>
        </div>

        <div class="form-group">
          <label for="confirmPw" class="text-label required">새 비밀번호 확인</label>
          <div class="form-box" id="confirmPwBox">
            <input type="password" id="confirmPw" autocomplete="off" placeholder="비밀번호 다시 입력">
          </div>
          <p class="text-error hidden" id="confirmPwError">비밀번호가 일치하지 않습니다.</p>
        </div>
      </div>
      <!-- E: 비밀번호 -->

      <div class="box-style bg-mint p-sm gap-0 text-center mt-xl">
        <p>문의 사항이 있으시면 아래로 연락해 주세요.</p>
        <strong>퍼시스 대표번호 (02-3400-6911)</strong>
      </div>
    </div>
    <!-- // #mypageContent -->

    <!--
      [본인확인 모달 — 사내기준 6.2]
      페이지 진입 시 자동 노출. 본인확인 미통과 시 회원정보 영역은 노출되지 않는다.
      .my-page 스코프 안에 두어 text-error 가 빨간색(`var(--oj-red)`)으로 표시되도록 한다.
    -->
    <div role="dialog" class="popup-wrap" id="verifyPrivacyModal">
      <div class="popup-dim"></div>
      <div class="popup-cont">
        <div class="popup-header">본인 확인</div>
        <div class="popup-body">
          <p class="mb-sm">개인정보 보호를 위해 비밀번호를 다시 입력해 주세요.</p>
          <div class="form-group">
            <label for="verifyPw" class="text-label required">현재 비밀번호</label>
            <div class="form-box" id="verifyPwBox">
              <input type="password" id="verifyPw" autocomplete="off" placeholder="비밀번호 입력" title="비밀번호 입력">
            </div>
            <p class="text-error hidden" id="verifyPwError">비밀번호가 일치하지 않습니다.</p>
          </div>
        </div>
        <div class="popup-footer">
          <button type="button" class="btn line" id="btnVerifyCancel">취소</button>
          <button type="button" class="btn dark" id="btnVerifySubmit">확인</button>
        </div>
      </div>
    </div>
  </div>
</th:block>

<th:block layout:fragment="script">
<script>
  /* global alertPopup, fnPopupOpen, fnPopupClose */

  /* ============================================================
   *  공통 헬퍼
   * ============================================================ */
  function setError(boxEl, msgEl, msg) {
    if (boxEl) boxEl.classList.add('error');
    if (msgEl) { if (msg) msgEl.textContent = msg; msgEl.classList.remove('hidden'); }
  }
  function clearError(boxEl, msgEl) {
    if (boxEl) boxEl.classList.remove('error');
    if (msgEl) msgEl.classList.add('hidden');
  }
  function alertMsg(text, cb) {
    if (typeof alertPopup === 'function') alertPopup(text, cb);
    else { alert(text); if (cb) cb(); }
  }

  /* ============================================================
   *  본인확인 — 사내기준 6.2
   *  진입 시 모달 강제, 통과 시 회원정보 영역 노출 + 마스킹 데이터 조회.
   *  서버에서 403 응답 시 토큰 만료로 간주하고 다시 모달을 띄운다.
   * ============================================================ */
  const mypageContent     = document.getElementById('mypageContent');
  const verifyPwEl        = document.getElementById('verifyPw');
  const verifyPwBox       = document.getElementById('verifyPwBox');
  const verifyPwError     = document.getElementById('verifyPwError');
  const btnVerifySubmit   = document.getElementById('btnVerifySubmit');
  const btnVerifyCancel   = document.getElementById('btnVerifyCancel');

  function openVerifyModal() {
    verifyPwEl.value = '';
    clearError(verifyPwBox, verifyPwError);
    fnPopupOpen('verifyPrivacyModal');
    setTimeout(() => verifyPwEl.focus(), 50);
  }

  /* 비밀번호 입력 중 엔터 → 확인 버튼 클릭과 동일 동작 */
  verifyPwEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !btnVerifySubmit.disabled) {
      e.preventDefault();
      btnVerifySubmit.click();
    }
  });

  btnVerifyCancel.addEventListener('click', () => {
    /* 취소는 모달만 닫는다 — 회원정보 영역은 hidden 그대로 두어 노출하지 않는다. */
    verifyPwEl.value = '';
    clearError(verifyPwBox, verifyPwError);
    fnPopupClose('verifyPrivacyModal');
  });

  btnVerifySubmit.addEventListener('click', async () => {
    clearError(verifyPwBox, verifyPwError);
    if (!verifyPwEl.value) {
      setError(verifyPwBox, verifyPwError, '비밀번호를 입력해 주세요.');
      return;
    }
    const res = await fetch('/api/auth/verifyPasswordForPrivacy', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ currentPassword: verifyPwEl.value })
    });
    if (!res.ok) {
      const body = await res.json().catch(() => ({}));
      const msg = body.detail || body.message || '비밀번호가 일치하지 않습니다.';
      setError(verifyPwBox, verifyPwError, msg);
      verifyPwEl.value = '';

      /* 사내기준 6.2 — 누적 실패로 차단된 경우 추가 시도 불가하므로 입력/확인 비활성화 */
      if (/실패\s*횟수를?\s*초과/.test(msg)) {
        verifyPwEl.disabled = true;
        btnVerifySubmit.disabled = true;
      } else {
        verifyPwEl.focus();
      }
      return;
    }
    verifyPwEl.value = '';
    fnPopupClose('verifyPrivacyModal');
    mypageContent.classList.remove('hidden');
    loadMyInfo();
  });

  /* fetch 래퍼 — 403 응답 시 본인확인 토큰 만료로 보고 모달 재오픈 */
  async function fetchJsonWithGuard(url, opts) {
    try {
      const res = await fetch(url, opts);
      if (res.status === 403) {
        alertMsg('본인 확인 시간이 만료되었습니다. 다시 확인해 주세요.', () => {
          mypageContent.classList.add('hidden');
          openVerifyModal();
        });
        return null;
      }
      const body = await res.json().catch(() => ({}));
      if (!res.ok) {
        alertMsg(body.detail || body.message || '요청 처리 중 오류가 발생했습니다.');
        return null;
      }
      return body;
    } catch (e) {
      console.error(url, e);
      alertMsg('요청 처리 중 오류가 발생했습니다.');
      return null;
    }
  }

  /* ============================================================
   *  회원 정보 — 조회/수정 모드 토글, PATCH 저장
   *  조회 응답은 항상 마스킹된 값. 수정 모드 진입 시 입력을 비워 새 값만 입력 받는다.
   * ============================================================ */
  const btnMemberEdit      = document.getElementById('btnMemberEdit');
  const memberActionArea   = document.getElementById('memberActionArea');
  const btnMemberCancel    = document.getElementById('btnMemberCancel');
  const btnMemberSave      = document.getElementById('btnMemberSave');
  const memberForm         = document.getElementById('memberForm');
  const memberLabels       = memberForm.querySelectorAll('.text-label');
  const nameEl   = document.getElementById('memberName');
  const phoneEl  = document.getElementById('memberPhone');
  const emailEl  = document.getElementById('memberEmail');
  const nameBox  = document.getElementById('memberNameBox');
  const phoneBox = document.getElementById('memberPhoneBox');
  const emailBox = document.getElementById('memberEmailBox');
  const nameErr  = document.getElementById('memberNameError');
  const phoneErr = document.getElementById('memberPhoneError');
  const emailErr = document.getElementById('memberEmailError');

  /* 조회 시 받은 마스킹 값 — 취소 시 복원 / 수정 모드 진입 시 input 비우기 */
  let maskedSnapshot = { ojNm: '', userHp: '', userEmail: '' };

  function toggleMemberEditMode(isEdit) {
    btnMemberEdit.classList.toggle('hidden', isEdit);
    memberActionArea.classList.toggle('hidden', !isEdit);
    memberLabels.forEach(l => l.classList.toggle('required', isEdit));
    [nameEl, phoneEl, emailEl].forEach(i => i.readOnly = !isEdit);

    if (isEdit) {
      /* 마스킹 값을 그대로 PUT 페이로드에 실리지 않도록 input 클리어.
       * placeholder 안내로 변경하려는 필드만 입력하도록 유도. */
      nameEl.value  = '';
      phoneEl.value = '';
      emailEl.value = '';
      nameEl.placeholder  = '변경할 이름 입력 (미입력 시 유지)';
      phoneEl.placeholder = '변경할 연락처 입력 (미입력 시 유지)';
      emailEl.placeholder = '변경할 이메일 입력 (미입력 시 유지)';
    } else {
      nameEl.value  = maskedSnapshot.ojNm;
      phoneEl.value = maskedSnapshot.userHp;
      emailEl.value = maskedSnapshot.userEmail;
      clearError(nameBox, nameErr);
      clearError(phoneBox, phoneErr);
      clearError(emailBox, emailErr);
    }
  }

  /* 전화번호 자동 포맷 — 010-1234-1234 형식 */
  function formatPhone(v) {
    const d = String(v || '').replace(/[^0-9]/g, '').slice(0, 11);
    if (!d) return '';
    if (d.startsWith('02')) {
      if (d.length <= 2)  return d;
      if (d.length <= 5)  return `${d.slice(0, 2)}-${d.slice(2)}`;
      if (d.length <= 9)  return `${d.slice(0, 2)}-${d.slice(2, 5)}-${d.slice(5)}`;
      return `${d.slice(0, 2)}-${d.slice(2, 6)}-${d.slice(6, 10)}`;
    }
    if (d.length <= 3)  return d;
    if (d.length <= 7)  return `${d.slice(0, 3)}-${d.slice(3)}`;
    if (d.length === 10) return `${d.slice(0, 3)}-${d.slice(3, 6)}-${d.slice(6)}`;
    return `${d.slice(0, 3)}-${d.slice(3, 7)}-${d.slice(7, 11)}`;
  }

  function applyMyInfo(info) {
    /* 응답은 이미 서버에서 마스킹된 값(010-****-1234, u***@gmail.com) */
    nameEl.value  = info.ojNm      || '';
    phoneEl.value = info.userHp    || '';
    emailEl.value = info.userEmail || '';
    maskedSnapshot = { ojNm: nameEl.value, userHp: phoneEl.value, userEmail: emailEl.value };
  }

  async function loadMyInfo() {
    const info = await fetchJsonWithGuard('/api/auth/myInfo', { method: 'GET', headers: { 'Accept': 'application/json' } });
    if (info) applyMyInfo(info);
  }

  /* 수정 모드 검증 — 변경 의도가 있는 필드만 형식 검사. 빈 값이면 변경 없음으로 처리. */
  function validateMemberPatch() {
    let ok = true;
    clearError(nameBox, nameErr);
    clearError(phoneBox, phoneErr);
    clearError(emailBox, emailErr);

    const phone = phoneEl.value.trim();
    if (phone && !/^\d{2,3}-?\d{3,4}-?\d{4}$/.test(phone)) {
      setError(phoneBox, phoneErr, '올바른 연락처 형식이 아닙니다.');
      ok = false;
    }

    const email = emailEl.value.trim();
    if (email && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
      setError(emailBox, emailErr, '올바른 이메일 형식이 아닙니다.');
      ok = false;
    }

    /* 최소 한 필드 이상 입력되어야 의미가 있다 */
    if (!nameEl.value.trim() && !phone && !email) {
      alertMsg('변경할 항목을 1개 이상 입력해 주세요.');
      ok = false;
    }
    return ok;
  }

  btnMemberEdit.addEventListener('click', () => toggleMemberEditMode(true));
  btnMemberCancel.addEventListener('click', () => toggleMemberEditMode(false));

  btnMemberSave.addEventListener('click', async () => {
    if (!validateMemberPatch()) return;

    /* 빈 값은 페이로드에서 제외 — 서버 SQL 의 dynamic if 가 SET 절에서 빠지도록 */
    const body = {};
    if (nameEl.value.trim())  body.ojNm      = nameEl.value.trim();
    if (phoneEl.value.trim()) body.userHp    = phoneEl.value.trim();
    if (emailEl.value.trim()) body.userEmail = emailEl.value.trim();

    const res = await fetch('/api/auth/updateMyInfo', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    if (res.status === 403) {
      alertMsg('본인 확인 시간이 만료되었습니다. 다시 확인해 주세요.', () => {
        toggleMemberEditMode(false);
        mypageContent.classList.add('hidden');
        openVerifyModal();
      });
      return;
    }
    if (!res.ok) {
      const errBody = await res.json().catch(() => ({}));
      alertMsg(errBody.detail || errBody.message || '회원정보 저장에 실패했습니다.');
      return;
    }
    alertMsg('수정이 완료되었습니다.', () => {
      toggleMemberEditMode(false);
      /* 저장 후 다시 마스킹된 최신 값으로 갱신 */
      loadMyInfo();
    });
  });

  /* 입력 시 에러 표시 즉시 제거 + 전화번호 자동 포맷 */
  nameEl.addEventListener('input',  () => clearError(nameBox, nameErr));
  phoneEl.addEventListener('input', () => {
    phoneEl.value = formatPhone(phoneEl.value);
    clearError(phoneBox, phoneErr);
  });
  emailEl.addEventListener('input', () => clearError(emailBox, emailErr));

  /* ============================================================
   *  비밀번호 변경 — 토글, 검증, 저장
   *  비밀번호 변경 자체가 현재 비밀번호 입력을 요구하므로 본인확인 가드와 별개로 동작.
   * ============================================================ */
  const btnPwEdit     = document.getElementById('btnPwEdit');
  const pwActionArea  = document.getElementById('pwActionArea');
  const btnPwCancel   = document.getElementById('btnPwCancel');
  const btnPwSave     = document.getElementById('btnPwSave');
  const pwForm        = document.getElementById('pwForm');
  const currentPwEl   = document.getElementById('currentPw');
  const newPwEl       = document.getElementById('newPw');
  const confirmPwEl   = document.getElementById('confirmPw');
  const currentPwBox  = document.getElementById('currentPwBox');
  const newPwBox      = document.getElementById('newPwBox');
  const confirmPwBox  = document.getElementById('confirmPwBox');
  const currentPwErr  = document.getElementById('currentPwError');
  const newPwErr      = document.getElementById('newPwError');
  const confirmPwErr  = document.getElementById('confirmPwError');
  const newPwHints    = document.getElementById('newPwHints');

  function togglePwEditMode(isEdit) {
    btnPwEdit.classList.toggle('hidden', isEdit);
    pwActionArea.classList.toggle('hidden', !isEdit);
    pwForm.classList.toggle('hidden', !isEdit);
    if (!isEdit) {
      [currentPwEl, newPwEl, confirmPwEl].forEach(el => el.value = '');
      clearError(currentPwBox, currentPwErr);
      clearError(newPwBox, newPwErr);
      clearError(confirmPwBox, confirmPwErr);
      resetPwHints();
    }
  }
  function resetPwHints() {
    newPwHints.querySelectorAll('li').forEach(li => {
      li.classList.remove('error');
      li.classList.remove('success');
    });
  }

  function updatePwHints() {
    const v = newPwEl.value;
    const lenOk     = v.length >= 8 && v.length <= 15;
    const upperOk   = /[A-Za-z]/.test(v);
    const digitOk   = /\d/.test(v);
    const specialOk = /[!@#$%^&*(),.?":{}|<>\-_=+`~\[\]/\\]/.test(v);
    const map = { length: lenOk, upper: upperOk, digit: digitOk, special: specialOk };
    newPwHints.querySelectorAll('li').forEach(li => {
      const key = li.dataset.hint;
      li.classList.toggle('success', !!map[key]);
      li.classList.toggle('error',   v.length > 0 && !map[key]);
    });
  }
  newPwEl.addEventListener('input', () => { updatePwHints(); clearError(newPwBox, newPwErr); });
  confirmPwEl.addEventListener('input', () => clearError(confirmPwBox, confirmPwErr));
  currentPwEl.addEventListener('input', () => clearError(currentPwBox, currentPwErr));

  function validatePw() {
    let ok = true;
    clearError(currentPwBox, currentPwErr);
    clearError(newPwBox, newPwErr);
    clearError(confirmPwBox, confirmPwErr);

    if (!currentPwEl.value) { setError(currentPwBox, currentPwErr, '현재 비밀번호를 입력해 주세요.'); ok = false; }

    const v = newPwEl.value;
    const lenOk     = v.length >= 8 && v.length <= 15;
    const hasLetter  = /[A-Za-z]/.test(v);
    const hasDigit   = /\d/.test(v);
    const hasSpecial = /[!@#$%^&*(),.?":{}|<>\-_=+`~\[\]/\\]/.test(v);
    const compositionOk = lenOk && hasLetter && hasDigit && hasSpecial;

    if (!v) { setError(newPwBox, newPwErr, '새 비밀번호를 입력해 주세요.'); ok = false; }
    else if (!compositionOk) { setError(newPwBox, newPwErr, '비밀번호 조건을 충족해 주세요.'); ok = false; }
    else if (currentPwEl.value && v === currentPwEl.value) { setError(newPwBox, newPwErr, '현재 비밀번호와 다르게 설정해 주세요.'); ok = false; }

    if (!confirmPwEl.value) { setError(confirmPwBox, confirmPwErr, '비밀번호 확인을 입력해 주세요.'); ok = false; }
    else if (confirmPwEl.value !== v) { setError(confirmPwBox, confirmPwErr, '비밀번호가 일치하지 않습니다.'); ok = false; }

    return ok;
  }

  btnPwEdit.addEventListener('click', () => togglePwEditMode(true));
  btnPwCancel.addEventListener('click', () => togglePwEditMode(false));
  btnPwSave.addEventListener('click', async () => {
    if (!validatePw()) return;
    const res = await fetch('/api/auth/changePassword', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        currentPassword: currentPwEl.value,
        newPassword:     newPwEl.value,
        confirmPassword: confirmPwEl.value
      })
    });
    if (!res.ok) {
      const errBody = await res.json().catch(() => ({}));
      const msg = errBody.detail || errBody.message || '비밀번호 변경에 실패했습니다.';
      if (/기존\s*비밀번호|현재\s*비밀번호/.test(msg)) {
        setError(currentPwBox, currentPwErr, msg);
        currentPwEl.value = '';
        currentPwEl.focus();
      } else {
        setError(newPwBox, newPwErr, msg);
      }
      return;
    }
    alertMsg('비밀번호가 변경되었습니다.', () => togglePwEditMode(false));
  });

  /* 페이지 진입 — 본인확인 모달 강제 노출 */
  openVerifyModal();
</script>
</th:block>
</body>
</html>
