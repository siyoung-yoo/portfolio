<html lang="ko" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{common/layout/default.html}">
<body class="bg-white">

<th:block layout:fragment="contents">
  <div id="bodyContent" class="my-page">
    <div class="title-area">
      <h2 class="page-title">마이페이지</h2>
    </div>
    <!-- // .title-area -->

    <div class="title-area justify-between mb-lg">
      <h3 class="group-title">회원 정보</h3>
      <button type="button" class="btn dark px-sm" id="btnMemberEdit">수정</button>

      <div class="btn-area hidden" id="memberActionArea">
        <button type="button" class="btn line px-sm">취소</button>
        <button type="button" class="btn dark px-sm">저장</button>
      </div>
    </div>

    <div class="layout-column gap-sm" id="memberForm">
      <div class="form-group">
        <label for="formA01" class="text-label">이름</label>
        <div class="form-box">
          <input type="text" id="formA01" autocomplete="off" value="홍길동" placeholder="이름 입력" title="이름 입력" readonly>
        </div>
        <p class="text-error">필수 항목입니다.</p>
      </div>

      <div class="form-group">
        <label for="formA02" class="text-label">연락처</label>
        <div class="form-box">
          <input type="text" id="formA02" autocomplete="off" value="010-1234-5678" placeholder="숫자만 입력" title="연락처 입력" readonly>
        </div>
        <p class="text-error">필수 항목입니다.</p>
      </div>

      <div class="form-group">
        <label for="formA03" class="text-label">이메일</label>
        <div class="form-box">
          <input type="text" id="formA03" autocomplete="off" value="user@gmail.com" placeholder="ID@email.com" title="이메일 입력" readonly>
        </div>
        <p class="text-error">필수 항목입니다.</p>
      </div>
    </div>

    <div class="divider-dash only-line"><hr class="solid-line text-gray"></div>

    <div class="title-area justify-between mb-lg">
      <h3 class="group-title">비밀번호</h3>
      <button type="button" class="btn line" id="btnPwEdit">비밀번호 변경</button>

      <div class="btn-area hidden" id="pwActionArea">
        <button type="button" class="btn line px-sm">취소</button>
        <button type="button" class="btn dark px-sm">저장</button>
      </div>
    </div>

    <div class="layout-column gap-sm hidden" id="pwForm">
      <div class="form-group">
        <label for="formB01" class="text-label required">현재 비밀번호</label>
        <div class="form-box"><!-- 항목 미입력 시, .form-box < .error 추가 -->
          <input type="password" id="formB01" autocomplete="off" placeholder="비밀번호 입력" title="비밀번호 입력">
        </div>
        <p class="text-error">현재 비밀번호를 입력해 주세요.</p>
      </div>

      <!--
        [비밀번호 조건 가이드]
        * 미충족: .form-hint-list li + .error, .form-box + .error
        * 미충족 없음: .form-box .error 제거
        * 충족: .form-hint-list li + .success
        * .form-box에 .error 있을 경우: .text-error(에러문구) 노출
      -->
      <div class="form-group">
        <label for="formB02" class="text-label required">새 비밀번호</label>
        <div class="form-box error">
          <input type="password" id="formB02" autocomplete="off" placeholder="새 비밀번호 입력">
        </div>
        <ul class="form-hint-list">
          <li class="error"><i class="icon"></i>8-15자</li>
          <li class="success"><i class="icon"></i>영문 대/소문자</li>
          <li><i class="icon"></i>숫자</li>
          <li><i class="icon"></i>특수문자</li>
        </ul>
        <p class="text-error">3가지 이상 조합이 필요합니다.</p>
      </div>

      <div class="form-group">
        <label for="formB03" class="text-label required">새 비밀번호 확인</label>
        <div class="form-box"><!-- 비밀번호 미일치 시, .form-box < .error 추가 -->
          <input type="password" id="formB03" autocomplete="off" placeholder="비밀번호 다시 입력">
        </div>
        <p class="text-error">비밀번호가 일치하지 않습니다.</p>
      </div>
    </div>

    <div class="box-style bg-mint p-sm gap-0 text-center mt-xl">
      <p>문의 사항이 있으시면 아래로 연락해 주세요.</p>
      <strong>퍼시스 대표번호 (02-3400-6911)</strong>
    </div>
  </div>
</th:block>

<th:block layout:fragment="script">
<script>
  const btnMemberEdit = document.querySelector('#btnMemberEdit');
  const memberActionArea = document.querySelector('#memberActionArea');
  const memberForm = document.querySelector('#memberForm');
  const memberLabels = memberForm.querySelectorAll('.text-label');
  const memberInputs = memberForm.querySelectorAll('input');

  const toggleMemberEditMode = (isEdit) => {
    btnMemberEdit.classList.toggle('hidden', isEdit);
    memberActionArea.classList.toggle('hidden', !isEdit);
    memberLabels.forEach(label => label.classList.toggle('required', isEdit) );
    memberInputs.forEach(input => input.readOnly = !isEdit );
  };

  // 회원 정보 수정 버튼 클릭
  btnMemberEdit.addEventListener('click', () => toggleMemberEditMode(true) );

  // 회원 정보 저장, 취소 버튼 클릭
  memberActionArea.querySelectorAll('.btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
      const isSaveButton = e.target.classList.contains('dark');
      if (isSaveButton) {
        alertPopup('수정이 완료되었습니다.', () => toggleMemberEditMode(false) );
        return;
      }
      toggleMemberEditMode(false);
    });
  });

  // 비밀번호 변경 버튼 클릭 시
  const btnPwEdit = document.querySelector('#btnPwEdit');
  const pwActionArea = document.querySelector('#pwActionArea');
  const pwForm = document.querySelector('#pwForm');

  const togglePwEditMode = (isEdit) => {
    btnPwEdit.classList.toggle('hidden', isEdit);
    pwActionArea.classList.toggle('hidden', !isEdit);
    pwForm.classList.toggle('hidden', !isEdit);
  };

  // 비밀번호 변경 버튼 클릭
  btnPwEdit.addEventListener('click', () => togglePwEditMode(true) );

  // 비밀번호 저장, 취소 버튼 클릭
  pwActionArea.querySelectorAll('.btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
      const isSaveButton = e.target.classList.contains('dark');
      if (isSaveButton) {
        alertPopup('수정이 완료되었습니다.', () => togglePwEditMode(false) );
        return;
      }
      togglePwEditMode(false);
    });
});
</script>
</th:block>
</body>
</html>
