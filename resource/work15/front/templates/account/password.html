<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
<th:block th:replace="~{common/layout/config.html}" />
</head>
<body class="scroll-responsive">
  <div class="full-page login-page">
    <h1 class="main-logo"><strong>OFFICE JOURNEY<br>PROGRAM</strong></h1>

    <div class="login-content">
      <form id="passwordForm">
      <div class="login-box layout-column gap-2xl">
        <div class="title-area">
          <h2 class="page-title">비밀번호 변경 안내</h2>
          <p class="page-description">최초 발급된 비밀번호를 사용 중입니다.<br>보안을 위해 새 비밀번호로 변경해 주세요.</p>
        </div>

        <div class="layout-column gap-sm">
          <div class="form-group">
            <label for="currentPw" class="text-label">현재 비밀번호</label>
            <div class="form-box" id="currentPwBox">
              <input type="password" id="currentPw" autocomplete="off" placeholder="비밀번호 입력" autofocus>
            </div>
            <p class="text-error hidden" id="currentPwError">현재 비밀번호를 입력해 주세요.</p>
          </div>

          <div class="form-group">
            <label for="newPw" class="text-label">새 비밀번호</label>
            <div class="form-box" id="newPwBox">
              <input type="password" id="newPw" autocomplete="off" placeholder="새 비밀번호 입력">
            </div>
            <ul class="form-hint-list" id="newPwHints">
              <li data-hint="length"><i class="icon"></i>8-15자</li>
              <li data-hint="upper"><i class="icon"></i>영문 대/소문자</li>
              <li data-hint="digit"><i class="icon"></i>숫자</li>
              <li data-hint="special"><i class="icon"></i>특수문자</li>
            </ul>
            <p class="text-error hidden" id="newPwError">3가지 이상 조합이 필요합니다.</p>
          </div>
        </div>

        <div class="form-group">
          <label for="confirmPw" class="text-label">새 비밀번호 확인</label>
          <div class="form-box" id="confirmPwBox">
            <input type="password" id="confirmPw" autocomplete="off" placeholder="비밀번호 다시 입력">
          </div>
          <p class="text-error hidden" id="confirmPwError">비밀번호가 일치하지 않습니다.</p>
        </div>

        <div class="btn-area">
          <button type="submit" class="btn dark lg" id="btnSubmit" disabled>비밀번호 변경</button>
        </div>

        <div class="logo-area">
          <div class="mark-logo"><span class="sr-only">FURSYS</span></div>
        </div>
      </div>
      </form>
    </div>
  </div>

  <th:block th:replace="~{common/layout/js.html}" />

  <script>
    /* global alertPopup */

    document.addEventListener('DOMContentLoaded', () => {
      const form          = document.getElementById('passwordForm');
      const btnSubmit     = document.getElementById('btnSubmit');
      const currentPwEl   = document.getElementById('currentPw');
      const newPwEl       = document.getElementById('newPw');
      const confirmPwEl   = document.getElementById('confirmPw');
      const currentPwBox  = document.getElementById('currentPwBox');
      const newPwBox      = document.getElementById('newPwBox');
      const confirmPwBox  = document.getElementById('confirmPwBox');
      const currentPwErr  = document.getElementById('currentPwError');
      const newPwErr      = document.getElementById('newPwError');
      const confirmPwErr  = document.getElementById('confirmPwError');
      const newPwHints    = document.getElementById('newPwHints');

      /* 헬퍼 */
      function setError(box, msgEl, msg) {
        if (box) box.classList.add('error');
        if (msgEl) { if (msg) msgEl.textContent = msg; msgEl.classList.remove('hidden'); }
      }
      function clearError(box, msgEl) {
        if (box) box.classList.remove('error');
        if (msgEl) msgEl.classList.add('hidden');
      }
      function alertMsg(text, cb) {
        if (typeof alertPopup === 'function') alertPopup(text, cb);
        else { alert(text); if (cb) cb(); }
      }

      /* 새 비밀번호 조건 평가 */
      function evalPw(v) {
        return {
          length:  v.length >= 8 && v.length <= 15,
          upper:   /[A-Za-z]/.test(v),
          digit:   /\d/.test(v),
          special: /[!@#$%^&*(),.?":{}|<>\-_=+`~\[\]/\\]/.test(v)
        };
      }
      /* 백엔드 정책(AuthService.isValidPassword) 미러: 8-15자 + 영문/숫자/특수문자 모두 포함 */
      function passwordPolicyOk(_v, map) {
        return map.length && map.upper && map.digit && map.special;
      }

      /* 새 비번 라이브 힌트 */
      function updateHints() {
        const v = newPwEl.value;
        const map = evalPw(v);
        newPwHints.querySelectorAll('li').forEach(li => {
          const key = li.dataset.hint;
          li.classList.toggle('success', !!map[key]);
          li.classList.toggle('error',   v.length > 0 && !map[key]);
        });
        clearError(newPwBox, newPwErr);
      }

      /* 폼 전체 입력 완료 여부 → 버튼 활성화 */
      function updateSubmitEnabled() {
        const allFilled = currentPwEl.value && newPwEl.value && confirmPwEl.value;
        btnSubmit.disabled = !allFilled;
      }

      currentPwEl.addEventListener('input', () => { clearError(currentPwBox, currentPwErr); updateSubmitEnabled(); });
      newPwEl    .addEventListener('input', () => { updateHints(); updateSubmitEnabled(); });
      confirmPwEl.addEventListener('input', () => { clearError(confirmPwBox, confirmPwErr); updateSubmitEnabled(); });

      function validate() {
        let ok = true;
        clearError(currentPwBox, currentPwErr);
        clearError(newPwBox, newPwErr);
        clearError(confirmPwBox, confirmPwErr);

        if (!currentPwEl.value) {
          setError(currentPwBox, currentPwErr, '현재 비밀번호를 입력해 주세요.'); ok = false;
        }

        const v = newPwEl.value;
        const map = evalPw(v);
        if (!v) {
          setError(newPwBox, newPwErr, '새 비밀번호를 입력해 주세요.'); ok = false;
        } else if (!map.length || !passwordPolicyOk(v, map)) {
          setError(newPwBox, newPwErr, '비밀번호 조건을 충족해 주세요.'); ok = false;
        } else if (currentPwEl.value && v === currentPwEl.value) {
          setError(newPwBox, newPwErr, '현재 비밀번호와 다르게 설정해 주세요.'); ok = false;
        }

        if (!confirmPwEl.value) {
          setError(confirmPwBox, confirmPwErr, '비밀번호 확인을 입력해 주세요.'); ok = false;
        } else if (confirmPwEl.value !== v) {
          setError(confirmPwBox, confirmPwErr, '비밀번호가 일치하지 않습니다.'); ok = false;
        }
        return ok;
      }

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        if (!validate()) return;
        btnSubmit.disabled = true;

        try {
          const res = await fetch('/api/auth/changePassword', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              currentPassword: currentPwEl.value,
              newPassword:     newPwEl.value,
              confirmPassword: confirmPwEl.value
            })
          });
          if (!res.ok) {
            const body = await res.json().catch(() => ({}));
            const msg = body.detail || body.message || '비밀번호 변경에 실패했습니다.';
            /* "기존/현재 비밀번호" 키워드 → 현재 비번 영역, 그 외 → 새 비번 영역 */
            if (/기존\s*비밀번호|현재\s*비밀번호/.test(msg)) {
              setError(currentPwBox, currentPwErr, msg);
              currentPwEl.value = '';
              currentPwEl.focus();
            } else {
              setError(newPwBox, newPwErr, msg);
            }
            return;
          }
          alertMsg('비밀번호가 변경되었습니다. 다시 로그인해 주세요.', () => {
            /* 비밀번호 변경 후 보안상 다시 로그인 유도 — 로그아웃 호출 후 로그인 페이지로 */
            fetch('/api/auth/logout', { method: 'POST' })
              .catch(() => {})
              .finally(() => { location.href = '/'; });
          });
        } catch (err) {
          console.error('changePassword', err);
          setError(newPwBox, newPwErr, '비밀번호 변경 중 오류가 발생했습니다.');
        } finally {
          updateSubmitEnabled();
        }
      });
    });
  </script>
</body>
</html>
