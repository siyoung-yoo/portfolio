<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
<th:block th:replace="~{common/layout/config.html}" />
</head>
<body class="scroll-responsive">
  <div class="full-page login-page">
    <h1 class="main-logo"><strong>OFFICE JOURNEY<br>PROGRAM</strong></h1>

    <div class="login-content">

      <form id="otpForm">
      <div class="login-box layout-column gap-2xl">
        <div class="title-area">
          <h2 class="page-title">문자 인증</h2>
          <p class="page-description" th:if="${maskedPhone != null and !#strings.isEmpty(maskedPhone)}" th:utext="|등록된 휴대폰 번호(${maskedPhone})로<br>인증번호를 발송했습니다.|">등록된 휴대폰 번호(010-****-1234)로<br>인증번호를 발송했습니다.</p>
          <p class="page-description" th:unless="${maskedPhone != null and !#strings.isEmpty(maskedPhone)}">등록된 휴대폰 번호로<br>인증번호를 발송했습니다.</p>
        </div>

        <div class="layout-column gap-sm">
          <div class="form-group type-verify">
            <label for="otpCode_1" class="text-label">인증번호 6자리</label>
            <div class="form-box num-only layout-flex" id="otpInputBox">
              <input type="text" id="otpCode_1" maxlength="1" autocomplete="off" inputmode="numeric" autofocus>
              <input type="text" id="otpCode_2" maxlength="1" autocomplete="off" inputmode="numeric">
              <input type="text" id="otpCode_3" maxlength="1" autocomplete="off" inputmode="numeric">
              <input type="text" id="otpCode_4" maxlength="1" autocomplete="off" inputmode="numeric">
              <input type="text" id="otpCode_5" maxlength="1" autocomplete="off" inputmode="numeric">
              <input type="text" id="otpCode_6" maxlength="1" autocomplete="off" inputmode="numeric">
            </div>

            <div class="form-info">
              <p class="text-blue" id="otpTimer">남은 시간 03:00</p>
              <p class="text-error hidden" id="otpErrorMsg">인증번호가 일치하지 않습니다.</p>
              <button type="button" class="btn link" id="btnResend">재발송</button>
            </div>
          </div>
        </div>

        <div class="btn-area">
          <button type="submit" class="btn dark lg" id="btnVerify" disabled>인증 확인</button>
        </div>

        <div class="logo-area">
          <div class="mark-logo"><span class="sr-only">FURSYS</span></div>
        </div>
      </div>
      </form>
    </div>
  </div>

  <th:block th:replace="~{common/layout/js.html}" />

  <script th:inline="javascript">
    /* 서버 주입: 2FA 만료 시각 (epoch ms). 없으면 진입 시점 + 180초로 fallback */
    const TWO_FA_EXPIRES = /*[[${twoFaExpires}]]*/ null;
    const FALLBACK_DURATION_MS = 180 * 1000;

    document.addEventListener('DOMContentLoaded', () => {
      const inputs    = Array.from(document.querySelectorAll('#otpInputBox input'));
      const inputBox  = document.getElementById('otpInputBox');
      const btnVerify = document.getElementById('btnVerify');
      const btnResend = document.getElementById('btnResend');
      const timerEl   = document.getElementById('otpTimer');
      const errorEl   = document.getElementById('otpErrorMsg');
      const form      = document.getElementById('otpForm');

      let countdownTimer = null;
      let expiredFlag    = false;

      /* ============================================================
       *  6칸 입력 핸들러 — 숫자만 / 자동 포커스 이동 / 백스페이스 / 붙여넣기
       * ============================================================ */
      inputs.forEach((el, i) => {
        el.addEventListener('input', (e) => {
          const v = e.target.value.replace(/[^0-9]/g, '');
          e.target.value = v;
          if (!v) { updateVerifyEnabled(); return; }
          // 다음 칸 포커스
          if (i < inputs.length - 1) inputs[i + 1].focus();
          updateVerifyEnabled();
        });
        el.addEventListener('keydown', (e) => {
          if (e.key === 'Backspace' && !el.value && i > 0) {
            // 현재 칸이 비어있으면 이전 칸으로 이동하면서 그 값도 지움
            e.preventDefault();
            inputs[i - 1].value = '';
            inputs[i - 1].focus();
            updateVerifyEnabled();
          } else if (e.key === 'ArrowLeft' && i > 0) {
            inputs[i - 1].focus();
          } else if (e.key === 'ArrowRight' && i < inputs.length - 1) {
            inputs[i + 1].focus();
          }
        });
        el.addEventListener('paste', (e) => {
          const txt = (e.clipboardData || window.clipboardData).getData('text');
          const digits = (txt || '').replace(/[^0-9]/g, '').slice(0, 6);
          if (!digits) return;
          e.preventDefault();
          digits.split('').forEach((ch, idx) => {
            if (inputs[idx]) inputs[idx].value = ch;
          });
          const next = Math.min(digits.length, inputs.length - 1);
          inputs[next].focus();
          updateVerifyEnabled();
        });
      });

      function readCode() {
        return inputs.map(el => el.value).join('');
      }
      function updateVerifyEnabled() {
        btnVerify.disabled = expiredFlag || readCode().length !== 6;
      }
      function clearInputs() {
        inputs.forEach(el => { el.value = ''; });
        inputs[0].focus();
        updateVerifyEnabled();
      }

      /* ============================================================
       *  카운트다운 — 서버 만료 시각 기준
       * ============================================================ */
      function startCountdown() {
        clearInterval(countdownTimer);
        const expiresAt = TWO_FA_EXPIRES ? Number(TWO_FA_EXPIRES) : (Date.now() + FALLBACK_DURATION_MS);
        tick(expiresAt);
        countdownTimer = setInterval(() => tick(expiresAt), 1000);
      }
      function tick(expiresAt) {
        const remainMs = expiresAt - Date.now();
        if (remainMs <= 0) {
          setExpiredState();
          return;
        }
        const sec = Math.floor(remainMs / 1000);
        const mm = String(Math.floor(sec / 60)).padStart(2, '0');
        const ss = String(sec % 60).padStart(2, '0');
        timerEl.textContent = `남은 시간 ${mm}:${ss}`;
      }

      /* ============================================================
       *  상태 토글 — 진입(기본) / 오류(.error + 메시지) / 만료(disabled)
       * ============================================================ */
      function setErrorState(msg) {
        inputBox.classList.add('error');
        timerEl.classList.remove('hidden'); // 남은 시간 계속 표시
        errorEl.classList.remove('hidden');
        errorEl.textContent = msg || '인증번호가 일치하지 않습니다.';
      }
      function clearErrorState() {
        inputBox.classList.remove('error');
        errorEl.classList.add('hidden');
      }
      function setExpiredState() {
        expiredFlag = true;
        clearInterval(countdownTimer);
        inputBox.classList.add('error');
        inputs.forEach(el => { el.disabled = true; });
        timerEl.classList.add('hidden');
        errorEl.classList.remove('hidden');
        errorEl.textContent = '인증 시간이 만료되었습니다.';
        btnVerify.disabled = true;
      }

      /* ============================================================
       *  인증 제출 — POST /api/auth/verify-otp
       * ============================================================ */
      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const code = readCode();
        if (code.length !== 6 || expiredFlag) return;

        clearErrorState();
        btnVerify.disabled = true;

        try {
          const res = await fetch('/api/auth/verify-otp', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
            body: JSON.stringify({ code })
          });
          const body = await res.json().catch(() => ({}));

          if (res.ok) {
            // 최초 발급 비밀번호 사용자는 비밀번호 변경 화면으로 유도
            if (body && body.passwordChangeRequired) {
              location.href = '/account/password';
              return;
            }
            // TODO: 대시보드 화면 준비되면 /pages/dashboard.html 로 교체
            location.href = '/layout#0';
            return;
          }
          // 잠금 응답 — 잠금 화면으로 이동 (OTP 5회 초과 등)
          if (body.lockReason) {
            location.href = '/account/locked?reason=' + encodeURIComponent(body.lockReason);
            return;
          }
          // 만료 메시지면 만료 상태로 전환
          if ((body.message || '').includes('만료')) {
            setExpiredState();
            return;
          }
          // 그 외 실패 — 메시지 표시 + 입력 초기화
          setErrorState(body.message || '인증번호가 올바르지 않습니다.');
          clearInputs();
        } catch (err) {
          console.error('verify-otp error', err);
          setErrorState('인증 처리 중 오류가 발생했습니다.');
        } finally {
          updateVerifyEnabled();
        }
      });

      /* ============================================================
       *  재발송 — 로그인 페이지로 돌아가 다시 로그인 (새 OTP 자동 발급)
       *  A안: 별도 API 신설 없이 단순 처리. 서버 측 OTP 재발급 API 가
       *       추가되면 여기서 직접 호출하도록 교체 가능.
       * ============================================================ */
      btnResend.addEventListener('click', () => {
        if (!confirm('인증번호를 재발송하려면 로그인 페이지로 돌아갑니다. 계속하시겠습니까?')) return;
        location.href = '/';
      });

      /* 초기화 */
      startCountdown();
      updateVerifyEnabled();
    });
  </script>
</body>
</html>
