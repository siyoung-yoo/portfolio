<html lang="ko" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{common/layout/default.html}">
<body>

<th:block layout:fragment="contents">
  <div id="bodyContent">
    <div class="title-area flex-col">
      <h2 class="page-title">계약 정보</h2>
      <p class="page-description">계약 내역 조회</p>
    </div>
    <!-- // .title-area -->

    <div class="search-area">
      <div class="row">
        <div class="form-group">
          <label for="form01" class="text-label">검색</label>
          <div class="form-box">
            <i class="icon-search"></i>
            <input type="text" id="form01" autocomplete="off" placeholder="계약 건명 검색" title="계약 건명 입력">
          </div>
        </div>

        <div class="form-group w-md">
          <label for="form02" class="text-label">대리점명</label>
          <div class="select-box">
            <button type="button" id="form02" class="btn-select" title="대리점명 선택"></button>
            <div class="option-list">
              <div class="scroll-y">
                <button type="button" class="selected">전체</button>
                <button type="button">option 01</button>
                <button type="button">option 02</button>
              </div>
            </div>
          </div>
        </div>

        <div class="form-group w-sm">
          <label for="form03" class="text-label">렌탈 상태</label>
          <div class="select-box">
            <button type="button" id="form03" class="btn-select" title="렌탈 상태 선택">전체</button>
            <div class="option-list">
              <div class="scroll-y">
                <button type="button"
                        th:each="opt : ${contractStatusOptions}"
                        th:text="${opt.label}"
                        th:attr="data-value=${opt.value}"
                        th:classappend="${opt.value == ''} ? 'selected'">
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="row">
        <div class="form-group w-lg">
          <label for="form21_1" class="text-label">렌탈 기간</label>
          <div class="range-picker">
            <div class="form-box">
              <input type="text" id="form21_1" class="start-date" autocomplete="off" placeholder="연도.월.일" title="렌탈 기간 시작 날짜 선택">
            </div>
            <span class="text-mid">~</span>
            <div class="form-box">
              <input type="text" id="form21_2" class="end-date" autocomplete="off" placeholder="연도.월.일" title="렌탈 기간 종료 날짜 선택">
            </div>
          </div>
        </div>

        <div class="btn-area">
          <button type="button" class="btn dark" id="btnSearch">검색</button>
          <button type="button" class="btn line" id="btnReset"><i class="icon-refresh"></i>초기화</button>
        </div>
      </div>
    </div>
    <!-- // search-area -->

    <div class="table-utils">
      <p class="table-info" id="totalCountInfo"
         th:text="${'전체 ' + totalCount + '건'}">전체 0건</p>
    </div>

    <div class="text-nodata" id="noDataMsg" style="display:none">검색 내역이 존재하지 않습니다.</div>

    <div class="table-wrap" id="tableWrap" style="display:none">
      <table class="is-selectable">
        <colgroup>
          <col style="width: 182px">
          <col style="width: 313px">
          <col style="width: 146px">
          <col style="width: 194px">
          <col>
          <col>
          <col>
        </colgroup>
        <thead>
          <tr>
            <th scope="col">계약번호</th>
            <th scope="col">계약 건명</th>
            <th scope="col">대리점명</th>
            <th scope="col">렌탈 기간</th>
            <th scope="col" class="text-center">계약 유형</th>
            <th scope="col" class="text-center">렌탈 상태</th>
            <th scope="col" class="text-center">결제 상태</th>
          </tr>
        </thead>
        <tbody id="contractTableBody"></tbody>
      </table>
    </div>

    <th:block th:replace="~{common/fragments/pagination :: pagination}"></th:block>

  </div>
</th:block>

<th:block layout:fragment="script">
<script>
  const tableWrap = document.getElementById('tableWrap');
  const noDataMsg = document.getElementById('noDataMsg');
  const totalInfo = document.getElementById('totalCountInfo');
  const tbody     = document.getElementById('contractTableBody');

  function toggleResult(hasData) {
    tableWrap.style.display = hasData ? '' : 'none';
    noDataMsg.style.display = hasData ? 'none' : '';
    const pagination = document.querySelector('.pagination');
    if (pagination) pagination.style.display = hasData ? '' : 'none';
  }

  function getSearchParams() {
    return {
      conTitle:       document.getElementById('form01').value.trim(),
      vndNm:          document.getElementById('form02').value.trim(),
      conFromDt:      document.getElementById('form21_1').value.replace(/\./g, '-'),
      conToDt:        document.getElementById('form21_2').value.replace(/\./g, '-'),
      contractStatus: document.getElementById('form03').dataset.value ?? ''
    };
  }

  function fetchPage(searchParams, pageNo) {
    const urlParams = new URLSearchParams({ ...searchParams, page: pageNo });

    fetch(`/contract?${urlParams}`, {
      headers: { 'X-Requested-With': 'XMLHttpRequest' }
    })
    .then(res => res.text())
    .then(html => {
      const doc      = new DOMParser().parseFromString(html, 'text/html');
      const wrapper  = doc.getElementById('contractRowsWrapper');
      const newBody  = wrapper?.querySelector('tbody');
      const newPagi  = doc.querySelector('.pagination');
      const isEmpty  = wrapper?.dataset.empty === 'true';
      const count    = parseInt(newPagi?.dataset.totalCount) || 0;

      if (totalInfo) totalInfo.textContent = `전체 ${count}건`;
      tbody.innerHTML = newBody ? newBody.innerHTML : '';

      const curPagi = document.querySelector('.pagination');
      if (newPagi && curPagi) curPagi.outerHTML = newPagi.outerHTML;

      toggleResult(!isEmpty);
    })
    .catch(err => console.error('계약 조회 오류:', err));
  }

  function searchContractInfo(pageNo) {
    const params = getSearchParams();
    SearchState.save('contract', params);
    fetchPage(params, pageNo || 1);
  }

  document.getElementById('btnSearch').addEventListener('click', () => searchContractInfo(1));

  document.getElementById('btnReset').addEventListener('click', () => {
    document.getElementById('form01').value = '';
    document.getElementById('form02').value = '';
    initDateRange();

    const btnSelect = document.getElementById('form03');
    btnSelect.textContent   = '전체';
    btnSelect.dataset.value = '';
    btnSelect.closest('.select-box').querySelectorAll('.option-list button').forEach((btn, i) => {
      btn.classList.toggle('selected', i === 0);
    });

    searchContractInfo(1)
  });

  function initDateRange() {
    const today          = new Date();
    const threeMonthsAgo = new Date(today);
    threeMonthsAgo.setMonth(threeMonthsAgo.getMonth() - 3);
    const fmt = d => `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`;
    document.getElementById('form21_1').value = fmt(threeMonthsAgo);
    document.getElementById('form21_2').value = fmt(today);
  }
  initDateRange();
  searchContractInfo(1);

  // 행 클릭 시 상세 페이지 이동
  document.getElementById('contractTableBody').addEventListener('click', e => {
    const row = e.target.closest('tr.row-link');
    if (!row || !row.dataset.href) return;
    window.open(row.dataset.href, '_blank');
  });

  // pagination:change 시 저장된 검색 조건 복원
  document.addEventListener('pagination:change', e => {
    const params = SearchState.load('contract');
    fetchPage(params, e.detail.page);
  });
</script>
</th:block>
</body>
</html>
