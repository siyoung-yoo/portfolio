<html lang="ko" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{common/layout/default.html}">
<body>

<th:block layout:fragment="contents">
  <input type="hidden" id="conIdx"  th:value="${detail.conIdx}" />
  <input type="hidden" id="conVndCd" th:value="${detail.conVndCd}" />

  <div id="bodyContent">
    <div class="title-area">
      <h2 class="contents-title" th:text="${detail.conTitle}">계약 상세</h2>
      <div id="detailContractStatus">
        <span th:if="${detail.contractStatus == '렌탈중'}"  class="badge-line-blue w-fix">렌탈중</span>
        <span th:if="${detail.contractStatus == '렌탈완료'}" class="badge bg-light-gray w-fix">완료</span>
      </div>
    </div>
    <!-- // .title-area -->

    <div class="receipt-layout">
      <div class="receipt-contents">
        <div class="header">
          <h3 class="group-title">계약 정보</h3>
          <button type="button" class="btn link" onclick="loadViewerInfo()">열람자 보기</button>
        </div>

        <div class="contents">
          <div class="group">
            <ul class="info-list col-2">
              <li>
                <div class="title">계약일</div>
                <div class="value spacing-lg" th:text="${detail.conContractDate}"></div>
              </li>
              <li>
                <div class="title">계약번호</div>
                <div class="value" th:text="${detail.conCd}"></div>
              </li>
              <li>
                <div class="title">계약 담당자</div>
                <div class="value" th:text="${detail.conCtManager}"></div>
              </li>
              <li>
                <div class="title">대리점</div>
                <div class="value">
                  <span th:text="${detail.vndNm}"></span>
                  <p class="text-sub" th:text="${detail.conUName} + ' ' +  ${detail.uPhone}"></p>
                </div>
              </li>
              <li>
                <div class="title">렌탈 기간</div>
                <div class="value" th:text="${detail.contractPeriod} + ' (' + ${detail.conPeriod} + '개월)'"></div>
              </li>
              <li class="span-2">
                <div class="title">설치 주소</div>
                <div class="value list-inline flex-wrap" id="detailAddressList">
                  <p th:each="entry : ${itemTree}" th:text="${entry.key}" class="text-box"></p>
                </div>
              </li>
              <li class="span-2">
                <div class="title"></div>
                <div class="value">
                  <div class="box-style type-progress">
                    <div class="top-area">
                      <div class="round">
                        <p class="label">진행 회차</p>
                        <div class="value">
                          <strong class="text-green" th:text="${detail.nowPeriod}">0</strong>
                          <span>/</span>
                          <span th:text="${detail.conPeriod} + '회'">0회</span>
                        </div>
                      </div>
                      <div class="amount">
                        <p class="label">렌탈료(VAT 포함)</p>
                        <div class="value">
                          <strong><span class="unit">월</span> <span><span th:text="${rentalPriceFmt}"></span>원</span></strong>
                          <span>/</span>
                          <span><span th:text="${rentalTotalFmt}"></span>원</span>
                        </div>
                      </div>
                    </div>

                    <div class="progress-bar">
                      <span class="bar" th:style="'width: ' + ${progressPct} + '%'"></span>
                    </div>

                    <div class="bottom-area">
                      <span th:text="${periodStart}"></span>
                      <span th:text="${periodEnd}"></span>
                    </div>
                  </div>
                </div>
              </li>
            </ul>
          </div>
          <!-- // 계약 정보 -->

          <div class="group">
            <div class="title-area justify-between">
              <h3 class="group-title">업로드 파일</h3>
              <span class="font-sm font-bold"><span id="detailFileCount">0</span>개</span>
            </div>
            <div class="list-inline flex-wrap" id="detailFileList">
              <!-- <a href="#" download class="btn light round md">
                <span>파일도면.dwg</span><i class="icon-download"></i>
              </a> -->
            </div>
          </div>
          <!-- // 업로드 파일 -->

          <div class="group">
            <div class="title-area">
              <h3 class="group-title">품목 정보</h3>
            </div>

            <!-- 탭 버튼 목록 -->
            <ul class="tab-list">
              <li th:each="entry, addrStat : ${itemTree}">
                <button type="button"
                        th:text="${entry.key}"
                        th:attr="data-target='#tabCont' + ${addrStat.index}"
                        th:classappend="${addrStat.first} ? 'is-active'"
                        class="tab"></button>
              </li>
            </ul>

            <!-- 탭 콘텐츠 -->
            <div class="tab-contents">
              <div th:each="entry, addrStat : ${itemTree}"
                   th:id="'tabCont' + ${addrStat.index}"
                   th:classappend="${addrStat.first} ? 'is-active'"
                   class="tab-cont">

                <div class="title-area justify-between font-sm">
                  <div class="flex-center gap-3xs">
                    <i class="icon-location"></i>
                    <p class="font-bold" th:text="${entry.key}"></p>
                  </div>
                  <p class="flex-center gap-3xs"><i class="dot"></i>인수담보부</p>
                </div>

                <div class="layout-column gap-xs">
                  <div th:each="spaceEntry, spaceStat : ${entry.value}" class="table-toggle">
                    <button type="button"
                            th:text="${spaceEntry.key}"
                            th:classappend="${spaceStat.first} ? 'is-expanded'"
                            th:attr="aria-controls='#table_' + ${addrStat.index} + '_' + ${spaceStat.index}"
                            class="btn-toggle"></button>
                    <div class="table-wrap"
                         th:id="'table_' + ${addrStat.index} + '_' + ${spaceStat.index}"
                         th:classappend="${spaceStat.first} ? 'is-expanded'">
                      <table>
                        <colgroup>
                          <col style="width: 110px"><col><col style="width: 245px"><col><col style="width: 99px">
                        </colgroup>
                        <thead>
                          <tr>
                            <th>품목 코드</th><th>색상</th><th>품목명</th><th>옵션</th><th>수량</th>
                          </tr>
                        </thead>
                        <tbody>
                          <tr th:each="itm : ${spaceEntry.value}">
                            <td>
                              <span th:text="${itm.mgItmCd}"></span>
                              <i th:if="${itm.comStdsec != '표준품'}" class="right-dot"></i>
                            </td>
                            <td th:text="${itm.mgColCd}"></td>
                            <td th:text="${itm.itmNm}"></td>
                            <td th:text="${itm.comStdsec}"></td>
                            <td th:text="${itm.mgQty}"></td>
                          </tr>
                        </tbody>
                      </table>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
      <!-- // 왼쪽 컨텐츠 영역 -->

      <div class="receipt-panel">
        <div class="panel-cont">
          <div class="title-area">
            <h3 class="group-title">결제 정보</h3>
          </div>

          <div class="box-style type-receipt">
            <div class="payment">
              <p class="text-sky">다음 결제</p>
              <p class="value" th:text="${nextPayDate}"></p>
            </div>
            <strong class="price">[[${rentalPriceFmt}]]원<span>VAT 포함</span></strong>
          </div>

          <ul class="info-list">
            <li>
              <div class="title">결제 상태</div>
              <div class="value">
                <span class="badge-line-green w-fix">정상</span>
              </div>
            </li>
            <li>
              <div class="title">결제 방식</div>
              <div class="value" th:text="${detail.mType}"></div>
            </li>
            <li>
              <div class="title">결제일</div>
              <div class="value">매월 <span th:text="${detail.mDay}"></span>일</div>
            </li>
          </ul>
        </div>

        <div class="divider-dash"><hr class="line"></div>

        <div class="panel-cont">
          <!-- 결제 방식: 카드일 경우 -->
          <ul class="info-list" th:if="${detail.mType == '카드CMS'}">
            <li>
              <div class="title">카드사</div>
              <div class="value" th:text="${detail.mCardName}"></div>
            </li>
            <li>
              <div class="title">카드번호</div>
              <div class="value" th:text="${detail.mCardNum}"></div>
            </li>
          </ul>

          <!-- 결제 방식: 계좌, CMS 경우 -->
          <ul class="info-list" th:if="${detail.mType == '계좌CMS'} or ${detail.mType == '가상계좌'}">
            <li>
              <div class="title">은행</div>
              <div class="value" th:text="${detail.mBank}"></div>
            </li>
            <li>
              <div class="title">계좌번호</div>
              <div class="value" th:text="${detail.mAccount}"></div>
            </li>
          </ul>
        </div>
      </div>
    </div>
  </div>

  <!-- 열람자 보기 모달 -->
  <th:block th:insert="~{contract/modal/viewerInfoModal}"></th:block>
</th:block>

<th:block layout:fragment="script">
<script>
  function loadViewerInfo() {
    const conIdx = document.getElementById('conIdx').value;
    if (!conIdx) return;

    fetch(`/contract/${conIdx}/viewers`)
      .then(res => res.text())
      .then(html => {
        document.getElementById('viewerInfoBody').innerHTML = html;
        fnPopupOpen('viewerInfoModal');
      })
      .catch(err => console.error('열람자 조회 오류:', err));
  }
</script>
</th:block>
</body>
</html>
