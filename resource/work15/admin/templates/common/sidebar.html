<html lang="ko" xmlns:th="http://www.thymeleaf.org">
  <div class="sidebar-wrapper" th:attr="data-sidebar-user-id=${@sessionInfo.authIdx}">
    <div class="sidebar-overlay"></div>
    <div class="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-header-top">
          <a  class="sidebar-logo">
            <img th:src="@{/assets/img/logo/logo_color.svg}" alt="logo"/>
          </a>

          <div class="sidebar-title">
            <p>Rental Plus</p>
            <span>v1.0.1</span>
          </div>

          <div class="btn btn-ghost">
            <i class="icon-notifications"></i>
          </div>

          <i class="icon-close sidebar-close"></i>
        </div>
        <div class="sidebar-header-mid">
          <div class="sidebar-user">
            <span class="user-name" th:text="${@sessionInfo.getName()}"></span>
            <span class="user-position">FURSYS 관리자</span>
          </div>
          <form-dropdown>
            <button slot="trigger" class="btn">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="1"/>
                <circle cx="19" cy="12" r="1"/>
                <circle cx="5" cy="12" r="1"/>
              </svg>
            </button>

            <button type="button" onclick="mailPop()" class="dropdown-item">
              <div class="flex items-center gap-2 py-2">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#768085" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m22 7-8.991 5.727a2 2 0 0 1-2.009 0L2 7"/><rect x="2" y="4" width="20" height="16" rx="2"/></svg>
                <span class="font-normal">메일작성</span>
              </div>
            </button>
            <button type="button" onclick="popUserMyInfo()" class="dropdown-item">
              <div class="flex items-center gap-2 py-2">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#768085" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="5"/><path d="M20 21a8 8 0 0 0-16 0"/></svg>
                <span class="font-normal">내 정보</span>
              </div>
            </button>
            <a href="/logout" class="dropdown-item block">
              <div class="flex items-center gap-2 py-2">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#768085" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m16 17 5-5-5-5"/><path d="M21 12H9"/><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/></svg>
                <span class="font-normal">로그아웃</span>
              </div>
            </a>
          </form-dropdown>
        </div>
        <div class="sidebar-header-bot">
          <input type="search" class="search" placeholder="Search"/>
        </div>
      </div>
      <div class="sidebar-content">
        <div class="sidebar-group">
          <ul class="sidebar-menu">
            <li class="sidebar-menu-item" th:each="menus: ${T(com.iamrental.component.MenuList).menus}"
                th:attr="data-sidebar-menu-id=${menus.menuIdx}"
                th:if="${menus.hasAuth(@sessionInfo.authIdx)}">
              <div class="sidebar-menu-button">
                <i th:if="${menus.menuIcon != null and !#strings.isEmpty(menus.menuIcon)}" th:attr="data-lucide=${menus.menuIcon}"></i>
                <span th:text="${menus.menuName}">견적 정보</span>
              </div>
              <ul class="sidebar-menuSub" th:if="${menus.getSubMenuList().size() gt 0}">
                <li class="sidebar-menuSub-item" th:each="submenu: ${menus.subMenuList}"
                    th:if="${submenu.hasAuth(@sessionInfo.authIdx)}"
                    th:classappend="${submenu.getActiveClass(currentFullUri)}">
                  <a th:href="${submenu.smUrl}">
                    <span th:text="${submenu.smName}">견적 정보(유통망)</span>
                  </a>
                </li>
              </ul>
            </li>
          </ul>
        </div>
      </div>
      <div class="sidebar-footer">
        <div class="fast-move">
          <div class="fast-move_button">
            <!-- <i class="icon-chevron"></i> -->
            <i data-lucide="chevron-up"></i>
            <span class="text-sm font-bold">빠른 이동</span>
          </div>
          <div class="fast-move_content">
            <form id="quickSearchForm">
              <form-select portal>
                <select name="quick_condition">
                  <option value="m_num">채권원장번호</option>
                  <option value="m_ct_name">계약고객</option>
                  <option value="con_title">계약명</option>
                  <option value="est_code">견적번호</option>
                  <option value="est_title">견적명</option>
                </select>
              </form-select>
              <div class="flex items-center gap-2 mt-2">
                <input type="search" class="search" placeholder="Search" name="quick_value">
                <button type="button" class="btn btn-secondary" onclick="quickSearch()">조회</button>
              </div>
            </form>
          </div>
        </div>
        <div class="side-footer_content">
          <p>개인정보처리방침</p>
          <span>ⓒ 2026 FURSYS All right reserved.</span>
        </div>
      </div>
    </div>

    <div class="modal" id="quickMoveModal">
      <div class="modal-dialog" style="width: calc(100vw - 96px); max-width: 1500px;">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">빠른 이동 검색 결과</h5>
            <button type="button" class="icon-close modal-close"></button>
          </div>
          <div class="modal-body">
            <div class="flex items-center justify-between gap-2 mb-3">
              <p class="text-sm text-[var(--muted-foreground)]" id="quickMoveSummary">검색 결과를 선택해 주세요.</p>
            </div>
            <div style="height: 430px;">
              <div id="quickMoveResultGrid" style="width: 100%; height: 100%;"></div>
            </div>
            <div style="display: none;">
              <table class="table" id="quickMoveResultTable" style="width: 100%; min-width: 0; text-align: center;">
                <thead>
                  <tr>
                    <th>채권원장번호</th>
                    <th>구분</th>
                    <th>계약고객</th>
                    <th>계약명</th>
                    <th>견적번호</th>
                    <th>견적명</th>
                    <th>수납스케줄러</th>
                    <th>회계스케줄러</th>
                  </tr>
                </thead>
                <tbody id="quickMoveResultBody">
                  <tr>
                    <td colspan="8" class="text-center">검색 결과가 없습니다.</td>
                  </tr>
                </tbody>
              </table>
            </div>
            <div id="quickMovePagination" class="flex items-center justify-center gap-2 mt-3" style="display: none;">
              <button type="button" class="btn btn-outline" id="quickMovePrevBtn" onclick="quickMovePagePrev()">Prev</button>
              <span class="text-sm text-[var(--muted-foreground)]" id="quickMovePageInfo">1 / 1</span>
              <button type="button" class="btn btn-outline" id="quickMoveNextBtn" onclick="quickMovePageNext()">Next</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</html>
