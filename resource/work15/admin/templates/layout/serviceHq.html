<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
    xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{common/layout/vanilla_default.html}">
<body>
<th:block layout:fragment="main">
  <div class="container-h-full">
    <form id="searchForm">
      <input type="hidden" name="status" id="searchStatus">
      <div class="card">
        <div class="card-content">
          <div class="grid grid-cols-1 sm:grid-cols-10 gap-2">
            <div class="input-group col-span-1 sm:col-span-5 lg:col-span-4 xl:col-span-3">
              <label>
                <span class="label">기간</span>
                <div class="flex gap-2">
                  <form-select class="w-1/3 flex-shrink-0">
                    <select name="radioBtnVal" id="radioBtnVal">
                      <option value="requestDt">신청일</option>
                      <option value="uploadDt">최종변경일</option>
                    </select>
                  </form-select>
                  <input id="dateRange" type="text" class="input datepicker-range w-2/3" placeholder="FROM ~ TO">
                  <input type="hidden" name="fromDt" id="fromDt">
                  <input type="hidden" name="endDt" id="endDt">
                </div>
              </label>
            </div>

            <div class="input-group col-span-1 sm:col-span-5 lg:col-span-4 xl:col-span-2">
              <label>
                <div class="flex justify-between items-center">
                  <span class="label">실적사업소 / 실적대리점</span>
                  <button type="button" class="btn-link text-xs text-gray-400 label" onclick="clearAgencyInput(this)">초기화</button>
                </div>
                <div class="input">
                  <input type="text" data-agency-display class="w-full overflow-hidden whitespace-nowrap text-ellipsis" placeholder="선택" readonly />
                  <input type="hidden" name="branch" data-agency-branch data-param="branch"/>
                  <input type="hidden" name="dealer" data-agency-dealer data-param="dealer"/>
                  <button type="button" onclick="openAgencyModal(this)">
                    <i class="icon-search w-[18px] h-[18px] bg-size-[18px]"></i>
                  </button>
                </div>
              </label>
            </div>

            <div class="input-group col-span-1 sm:col-span-4 lg:col-span-2 xl:col-span-1">
              <label>
                <span class="label">영업담당자</span>
                <form-select>
                  <select name="cepCd" id="cepCd">
                    <option value="">전체</option>
                    <option th:each="agent : ${salesAgntList}" th:value="${agent.CEP_CD}" th:text="${agent.CEP_NM}"></option>
                  </select>
                </form-select>
              </label>
            </div>

            <div class="input-group col-span-1 sm:col-span-6 lg:col-span-4 xl:col-span-3">
              <label>
                <span class="label">검색</span>
                <div class="flex gap-2">
                  <form-select class="w-1/3 flex-shrink-0">
                    <select name="searchType" id="searchType">
                      <option value="corpNm">고객명</option>
                      <option value="userNm">신청자명</option>
                      <option value="title">신청명</option>
                    </select>
                  </form-select>
                  <input type="text" id="searchKeyword" name="searchKeyword" class="input w-2/3" placeholder="검색어를 입력하세요">
                </div>
              </label>
            </div>

            <div class="flex justify-end items-end sm:col-span-10 lg:col-span-6 xl:col-span-1">
              <button id="btnSearch" type="button" class="btn btn-check" onclick="searchOrderList()">조회</button>
            </div>
          </div>
        </div>
      </div>
    </form>

    <div class="card mt-3 card-h-full">
      <div class="card-header">
        <div class="flex justify-between items-center flex-wrap gap-4">
          <h3 class="card-title">레이아웃 서비스</h3>
          <div class="flex gap-1">
            <button class="btn btn-outline" onclick="openServiceRegModal()">서비스 등록</button>
          </div>
        </div>
      </div>
      <div class="card-content flex flex-col overflow-hidden">
        <ul class="tabs mb-3 flex-shrink-0" data-target="#tabContents1">
          <li class="tab-item is-active" data-tab="tab1">전체 <span id="totalCount">0</span></li>
          <li class="tab-item" data-tab="tab2">신청 <span id="requestCount">0</span></li>
          <li class="tab-item" data-tab="tab3">접수 <span id="receiptCount">0</span></li>
          <li class="tab-item" data-tab="tab4">진행 <span id="processCount">0</span></li>
          <li class="tab-item" data-tab="tab5">완료 <span id="completeCount">0</span></li>
        </ul>
        <div class="tab-contents flex-1 overflow-hidden" id="tabContents1">
          <div id="tab1" class="tab-content h-full is-active">
            <div class="w-full h-full" id="totalGrid"></div>
          </div>
          <div id="tab2" class="tab-content h-full">
            <div class="w-full h-full" id="requestGrid"></div>
          </div>
          <div id="tab3" class="tab-content h-full">
            <div class="w-full h-full" id="receiptGrid"></div>
          </div>
          <div id="tab4" class="tab-content h-full">
            <div class="w-full h-full" id="processGrid"></div>
          </div>
          <div id="tab5" class="tab-content h-full">
            <div class="w-full h-full" id="completeGrid"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- modal -->
  <th:block th:replace="~{layout/modal/serviceRatingModal.html}"/><!-- [2026-06-01] 만족도 조사 결과 팝업 -->
  <th:block th:replace="~{layout/modal/dealerAssignmentModal.html}"/><!-- [2026-06-01] 신규 대리점 배정 팝업 -->
  <th:block th:replace="~{layout/modal/serviceRegModal.html}"/>
  <th:block th:replace="~{layout/modal/ojAccountSearchModal.html}"/>
  <th:block th:replace="~{layout/modal/layoutSearchModal.html}"/>
  <!-- 고객 검색 (공통) -->
  <th:block th:replace="~{modal/agencyModal.html}"/>
  <th:block th:replace="~{modal/customerSearchModal.html}"/>
  <!--// modal -->
</th:block>

<th:block layout:fragment="script">
    <script th:inline="javascript">
      const renderer = { type: "TemplateRenderer" };
      const filter = { showIcon: true };

      // 공통 컬럼 레이아웃 (전 탭 동일)
      const columnLayout = [
        { headerText: '신청일', dataField: 'REQ_DATE', filter: filter, width: 120, style: 'text-center' },
        { headerText: '신청번호', dataField: 'REQ_NO', filter: filter, width: 150, renderer: renderer,
          labelFunction: function(rowIndex, columnIndex, value, headerText, item) {
            const reqNo = item.REQ_NO || '';
            return `<button type="button" class="btn btn-link" onclick="goServiceDetail('${reqNo}')">` + value + `</button>`;
          }
        },
        { headerText: '신청명', dataField: 'REQ_TITLE', filter: filter, width: 250, },
        { headerText: '진행상태', dataField: 'SERVICE_STATUS', filter: filter, width: 95, style: 'text-center', renderer: renderer,
          labelFunction: function (rowIndex, columnIndex, value, headerText, item) {
            if (value == "REQUEST") {
              return `<span class="badge badge-rounded badge-default">신청</span>`
            } else if (value == "ACCEPT") {
              return `<span class="badge badge-rounded badge-outline">접수</span>`
            } else if (value == "IN-PROGRESS") {
              return `<span class="badge badge-rounded badge-outline">진행</span>`
            } else if (value == "COMPLETE") {
              return `<span class="badge badge-rounded badge-secondary">완료</span>`
            }
          }
        },

        // [2026-06-01] 본사 배정, 실적사업소, 실적대리점 추가
        { headerText: "본사 배정", dataField: "TEMP_DATA01", width: 80, style: 'text-center', renderer: renderer,
          labelFunction: function (rowIndex, columnIndex, value, headerText, item) {
            if (value == '본사 배정') {
              return `<div class="flex items-center justify-center gap-1 -mx-2">
                        <span>요청</span>
                        <button class="btn btn-outline btn-icon" onclick="openModal('dealerAssignmentModal')"><i class="icon-search w-[12px] h-[12px] bg-size-[12px]"></i></button>
                      </div>`
            }
            else if (value == '배정 완료') { return `<i class="icon-check -ml-1"></i>` }
            else { return ''; }
          }
        },
        { headerText: "실적사업소", dataField: "TEMP_DATA02", filter: filter, width: 155, },
        { headerText: "실적대리점", dataField: "TEMP_DATA03", filter: filter, width: 120, },

        { headerText: '고객명', dataField: 'CTM_NM', filter: filter, width: 160 },
        { headerText: '신청자', dataField: 'OJ_NM', filter: filter, width: 100, style: 'text-center' },
        { headerText: '담당자', dataField: 'CEP_NM', filter: filter, width: 100, style: 'text-center' },
        { headerText: 'CEP_CD', dataField: 'CEP_CD', visible: false },
        { headerText: '최종변경일', dataField: 'UPD_SYS_DT', filter: filter, width: 120, style: 'text-center' },

        // [2026-06-01] 만족도 조사 추가
        { headerText: '만족도 조사', dataField: 'TEMP_DATA04', width: 95, style: 'text-center', renderer: renderer,
          labelFunction: function (rowIndex, columnIndex, value, headerText, item) {
            if (value == 'Y') {
              return `<div class="flex items-center justify-center gap-1">
                        <span>완료</span>
                        <button class="btn btn-outline btn-icon" onclick="openModal('serviceRatingModal')"><i class="icon-search w-[12px] h-[12px] bg-size-[12px]"></i></button>
                      </div>`
            } else { return ''; }
          }
        },
      ];

      const gridProps = {
        isRowAllCheckCurrentView: true,
        enableSorting: true,
        enableFilter: true,
        hoverMode: 'singleRow',
        selectionMode: 'singleRow',
        showRowNumColumn: true,
        showRowCheckColumn: false,
        defaultColumnWidth: 100,
        softRemoveRowMode: false,
        enableMovingColumn: true,
        usePaging: true,
        height: '100%',
      };

      // 탭별 그리드 ID
      const gridIds = {
        tab1: null,
        tab2: null,
        tab3: null,
        tab4: null,
        tab5: null,
      };

      // 탭별 상태 필터
      const tabStatusMap = {
        tab1: '',
        tab2: 'REQUEST',
        tab3: 'ACCEPT',
        tab4: 'IN-PROGRESS',
        tab5: 'COMPLETE',
      };

      // 탭별 그리드 엘리먼트
      const tabGridElMap = {
        tab1: 'totalGrid',
        tab2: 'requestGrid',
        tab3: 'receiptGrid',
        tab4: 'processGrid',
        tab5: 'completeGrid',
      };

      // 탭별 카운트 엘리먼트
      const tabCountElMap = {
        tab1: 'totalCount',
        tab2: 'requestCount',
        tab3: 'receiptCount',
        tab4: 'processCount',
        tab5: 'completeCount',
      };

      let activeTabId = 'tab1';

      // 빈 그리드 즉시 생성
      gridIds.tab1 = AUIGrid.create('#totalGrid', columnLayout, gridProps);

      // 페이지 로드 완료 후 그리드 리사이즈
      window.addEventListener('load', function() {
        AUIGrid.resize(gridIds.tab1);
      });

      // 탭 변경 이벤트
      function initTabs() {
        const tabs = document.querySelectorAll('.tab-item');
        tabs.forEach(tab => {
          tab.addEventListener('click', function () {
            activeTabId = this.dataset.tab;

            tabs.forEach(t => t.classList.remove('is-active'));
            this.classList.add('is-active');

            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('is-active'));
            document.getElementById(activeTabId).classList.add('is-active');

            searchOrderList();
          });
        });
      }

      // 날짜 기본값 세팅 (1개월 전 ~ 오늘)
      function initDateRange() {
        const today = new Date();
        const oneMonthAgo = new Date();
        oneMonthAgo.setMonth(oneMonthAgo.getMonth() - 1);

        const dateRangeEl = document.getElementById('dateRange');
        if (dateRangeEl.datepickerRange) {
          dateRangeEl.datepickerRange.selectDate([oneMonthAgo, today]);
        }

        const pad = (n) => String(n).padStart(2, '0');
        const fromStr = oneMonthAgo.getFullYear() + '.' + pad(oneMonthAgo.getMonth() + 1) + '.' + pad(oneMonthAgo.getDate());
        const toStr = today.getFullYear() + '.' + pad(today.getMonth() + 1) + '.' + pad(today.getDate());
        dateRangeEl.value = fromStr + ' ~ ' + toStr;
      }

      // 조회
      async function searchOrderList() {
        const gridElId = tabGridElMap[activeTabId];
        const result = ensureGrid('#' + gridElId, columnLayout, gridProps, gridIds[activeTabId]);
        gridIds[activeTabId] = result.gridId;

        // dateRange 표시값에서 fromDt, endDt 추출
        const dateRangeEl = document.getElementById('dateRange');
        const dateVal = dateRangeEl.value;
        if (!dateVal || dateVal.indexOf(' ~ ') === -1) {
          alert('조회 기간을 선택해주세요.');
          return;
        }
        const dates = dateVal.split(' ~ ');
        const fromDtVal = dates[0].replace(/[.\-]/g, '');
        const endDtVal = dates[1].replace(/[.\-]/g, '');
        document.getElementById('fromDt').value = fromDtVal;
        document.getElementById('endDt').value = endDtVal;

        // hidden status 값 세팅
        document.getElementById('searchStatus').value = tabStatusMap[activeTabId];

        AUIGrid.showAjaxLoader(gridIds[activeTabId]);
        try {
          const params = Object.fromEntries(new FormData(document.getElementById('searchForm')));
          const json = await fetchJson('/layout/service/selectServiceList.dataTable', 'POST', params);
          // const data = json?.data || [];

          // [2026-06-01] 퍼블 확인용 임시로 데이터 추가
          const data = [
            { 'REQ_DATE': '2026-01-01', 'REQ_NO': 'LS202601010001', 'REQ_TITLE': 'test', 'SERVICE_STATUS': 'IN-PROGRESS', 'TEMP_DATA01': '본사 배정', 'TEMP_DATA02': '', 'TEMP_DATA03': '', 'CTM_NM': '삼성전자(주)', 'OJ_NM': '신청자', 'CEP_NM': '담당자', 'UPD_SYS_DT': '2026-01-01', 'TEMP_DATA04': 'N', },
            { 'REQ_DATE': '2026-01-01', 'REQ_NO': 'LS202601010001', 'REQ_TITLE': 'test', 'SERVICE_STATUS': 'IN-PROGRESS', 'TEMP_DATA01': '배정 완료', 'TEMP_DATA02': '사업소명', 'TEMP_DATA03': '대리점명', 'CTM_NM': '삼성전자(주)', 'OJ_NM': '신청자', 'CEP_NM': '담당자', 'UPD_SYS_DT': '2026-01-01', 'TEMP_DATA04': 'Y', },
            { 'REQ_DATE': '2026-01-01', 'REQ_NO': 'LS202601010001', 'REQ_TITLE': 'test', 'SERVICE_STATUS': 'IN-PROGRESS', 'TEMP_DATA01': '기존 대리점', 'TEMP_DATA02': '사업소명', 'TEMP_DATA03': '대리점명', 'CTM_NM': '삼성전자(주)', 'OJ_NM': '신청자', 'CEP_NM': '담당자', 'UPD_SYS_DT': '2026-01-01', 'TEMP_DATA04': 'Y', },
          ]

          AUIGrid.setGridData(gridIds[activeTabId], data);
          document.getElementById(tabCountElMap[activeTabId]).textContent = data.length;
        } finally {
          AUIGrid.removeAjaxLoader(gridIds[activeTabId]);
        }

        await updateAllCounts();
      }

      // 전체 탭 카운트 업데이트 (status 없이 전체 조회 후 상태별 카운트)
      async function updateAllCounts() {
        // status를 비워 전체 조회
        document.getElementById('searchStatus').value = '';
        const params = serializeForm('#searchForm');
        document.getElementById('searchStatus').value = tabStatusMap[activeTabId];

        try {
          const response = await fetch('/layout/service/selectServiceList.dataTable', {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded; charset=UTF-8' },
            body: params
          });
          const json = await response.json();
          if (!json.data) return;

          // 상태별 카운트 집계
          const counts = {};
          json.data.forEach(row => {
            const s = row.SERVICE_STATUS;
            counts[s] = (counts[s] || 0) + 1;
          });

          document.getElementById('totalCount').textContent    = json.data.length;
          document.getElementById('requestCount').textContent  = counts['REQUEST']     || 0;
          document.getElementById('receiptCount').textContent  = counts['ACCEPT']      || 0;
          document.getElementById('processCount').textContent  = counts['IN-PROGRESS'] || 0;
          document.getElementById('completeCount').textContent = counts['COMPLETE']    || 0;
        } catch (e) {
          console.error('카운트 조회 오류:', e);
        }
      }

      const STORAGE_KEY = 'layoutServiceSearchConditions';

      function saveSearchConditions() {
        sessionStorage.setItem(STORAGE_KEY, JSON.stringify({
          dateRange:     document.getElementById('dateRange').value,
          radioBtnVal:   document.getElementById('radioBtnVal').value,
          cepCd:         document.getElementById('cepCd').value,
          searchType:    document.getElementById('searchType').value,
          searchKeyword: document.getElementById('searchKeyword').value,
          activeTabId:   activeTabId,
        }));
      }

      function restoreSearchConditions() {
        const saved = sessionStorage.getItem(STORAGE_KEY);
        if (!saved) return false;

        const c = JSON.parse(saved);

        // 날짜 복원
        const dateRangeEl = document.getElementById('dateRange');
        if (c.dateRange && c.dateRange.indexOf(' ~ ') !== -1) {
          const dates = c.dateRange.split(' ~ ');
          const fromParts = dates[0].split('.');
          const toParts   = dates[1].split('.');
          const from = new Date(fromParts[0], fromParts[1] - 1, fromParts[2]);
          const to   = new Date(toParts[0],   toParts[1] - 1,   toParts[2]);
          if (dateRangeEl.datepickerRange) dateRangeEl.datepickerRange.selectDate([from, to]);
          dateRangeEl.value = c.dateRange;
        }

        // 셀렉트박스 복원
        const radioBtnEl = document.getElementById('radioBtnVal');
        if (radioBtnEl?.closest('form-select')?.setValue) radioBtnEl.closest('form-select').setValue(c.radioBtnVal);
        const cepCdEl = document.getElementById('cepCd');
        if (cepCdEl?.closest('form-select')?.setValue) cepCdEl.closest('form-select').setValue(c.cepCd);
        const searchTypeEl = document.getElementById('searchType');
        if (searchTypeEl?.closest('form-select')?.setValue) searchTypeEl.closest('form-select').setValue(c.searchType);

        document.getElementById('searchKeyword').value = c.searchKeyword || '';

        // 탭 복원
        if (c.activeTabId && c.activeTabId !== 'tab1') {
          const tabEl = document.querySelector('[data-tab="' + c.activeTabId + '"]');
          if (tabEl) tabEl.click();
        }

        return true;
      }

      document.addEventListener('DOMContentLoaded', () => {
        initTabs();
        if (restoreSearchConditions()) {
          searchOrderList();
        } else {
          initDateRange();
        }
      });

      window.addEventListener('resize', () => {
        Object.values(gridIds).forEach(id => {
          if (id) AUIGrid.resize(id);
        });
      });

      function goServiceDetail(reqNo) {
        saveSearchConditions();
        location.href = '/layout/serviceDetail/' + reqNo;
      }

      document.addEventListener('keydown', function (event) {
        if (event.key === 'Enter' && event.target.tagName !== 'TEXTAREA') {
          event.preventDefault();
          searchOrderList().then(() => updateAllCounts());
        }
      });
    </script>
</th:block>
</body>
</html>
