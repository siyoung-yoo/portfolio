<div class="modal" id="registDrawModalPub">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <div>
          <h5 class="modal-title">도면 등록</h5>
          <p class="modal-description mt-3">주소가 선택된 상태에서 계약건을 선택하고, 도면 파일을 업로드하세요.</p>
        </div>
        <button type="button" class="icon-close modal-close"></button>
      </div>
      <div class="modal-body">

        <div class="grid gap-3">
          <div class="input-group">
            <span class="label">고객사</span>
            <div class="input items-center gap-1">
              <span>(주) 테크노</span>
              <span class="text-xs text-primary-300">(123-45-67890)</span>
            </div>
          </div>

          <div class="input-group">
            <span class="label">주소</span>
            <div class="input items-center gap-1">
              <span>서울 송파구 오금동 123</span>
              <span class="text-xs text-primary-300">(계약 1건)</span>
            </div>
          </div>

          <div class="group">
            <span class="label required mb-2">계약건</span>

            <form-select allow-html>
              <select name="">
                <option value="" hidden><p class="text-primary-300">해당 주소의 계약을 선택하세요</p></option>
                <option value="1">
                  <div class="flex items-start gap-2">
                    <span class="whitespace-normal">CNT-2025-056 - 계약명 1</span>
                    <!-- [2026-04-22] 미매핑 배지 삭제, 이전설치 배지만 노출 -->
                    <!-- <span class="badge badge-orange">미매핑</span> -->
                  </div>
                </option>
                <option value="relocation">
                  <div class="flex items-start gap-2">
                    <span class="whitespace-normal">CNT-2025-056 - 계약명 1</span>
                    <span class="badge badge-orange"><i class="icon-switch mr-1"></i>이전설치</span>
                  </div>
                </option>
              </select>
            </form-select>
          </div>

          <div class="badge badge-orange w-full mb-2 hidden" data-state="relocation">
            <div class="w-full p-2 text-sm">
              <h5 class="flex items-end justify-between">
                <div class="flex items-center gap-1"><i class="icon-switch"></i> 이전설치 계약</div>
                <p class="text-indent">* 이전설치 계약은 품목 매핑 시 시리얼 번호 지정이 필요합니다</p>
              </h5>
              <p class="text-primary-400 mt-3">기존 주소 : 서울 강남구 대치동 890, 서울 서초구 반포동 200</p>
              <p class="text-primary-400 mt-1">이전 품목 3종 · 총 15개</p>
            </div>
          </div>

          <div class="input-group">
            <label>
              <div class="flex justify-between flex-wrap gap-1 mb-2">
                <span class="label required mb-0 mr-6">도면 공간 (층수)</span>
                <div class="flex gap-1 text-xs text-muted-foreground">
                  <span class="flex-shrink-0">* 기존 등록된 층 :</span>
                  <span>2F, 3F</span>
                </div>
              </div>
              <input type="text" name="" id="" class="input" placeholder="예: 3F, B1, 1F 로비">
            </label>
          </div>

          <div class="input-group mb-2">
            <span class="label required">도면 노출 여부</span>
            <div class="flex items-center gap-8 mt-3">
              <label class="inline-flex items-center gap-2">
                <input type="radio" name="option" class="radio" checked />
                <span class="text-sm">고객 노출</span>
              </label>
              <label class="inline-flex items-center gap-2">
                <input type="radio" name="option" class="radio" />
                <span class="text-sm">고객 미노출</span>
              </label>
            </div>
          </div>

          <div class="input-group">
            <span class="label required">PDF 도면</span>
            <div  class="input p-0 overflow-hidden transition-colors hover:border-primary-200" data-upload-zone>
              <label data-upload-msg
                class="w-full text-sm text-muted-foreground px-3 py-5 text-center cursor-pointer">
                드래그하거나 클릭하여 파일을 업로드하세요
                <span class="block text-xs mt-2">(최대 00MB)</span>
                <input data-upload-input type="file" accept=".pdf" class="hidden">
              </label>
              <ul data-upload-list class="w-full hidden"></ul>
            </div>
          </div>

          <!-- [2026-04-22] DXF 파일 업로드 추가, 안내 문구 수정, 최대 파일용량 안내문구 추가 -->
          <div class="input-group">
            <span class="label">DWG/DXF 도면</span>
            <div  class="input p-0 overflow-hidden transition-colors hover:border-primary-200" data-upload-zone>
              <label data-upload-msg
                class="w-full text-sm text-muted-foreground px-3 py-5 text-center cursor-pointer">
                DWG 또는 DXF 파일을 업로드하세요 <span class="text-xs">(선택)</span>
                <span class="block text-xs mt-2">(최대 00MB)</span>
                <input data-upload-input type="file" accept=".dwg, .dxf" class="hidden">
              </label>
              <ul data-upload-list class="w-full hidden"></ul>
            </div>
          </div>
          <!-- // [2026-04-22] DXF 파일 업로드 추가, 안내 문구 수정, 최대 파일용량 안내문구 추가 -->
        </div>

      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-outline modal-close">취소</button>
        <button type="button" class="btn btn-primary" onclick="btnSave()">다음</button>
      </div>
    </div>
  </div>
</div>

<script>
//////////////////////////////////////////////////////////
//// ui 확인을 위한 임시 구현
//////////////////////////////////////////////////////////

// 다음 버튼 클릭
function btnSave() {
  window.location.href = '/layout/create';
}

// 이전설치 계약건 선택
document.querySelector('#registDrawModalPub form-select select').addEventListener('change', function(e) {
  const relocationEls = document.querySelectorAll('[data-state="relocation"]');
  if (e.target.value === 'relocation') {
    relocationEls.forEach(el => el.classList.remove('hidden'));
  } else {
    relocationEls.forEach(el => el.classList.add('hidden'));
  }
});

// 파일 업로드 기능
document.querySelectorAll('[data-upload-zone]').forEach(zone => {
  const input = zone.querySelector('[data-upload-input]');
  const list = zone.querySelector('[data-upload-list]');
  const msg = zone.querySelector('[data-upload-msg]');
  let files = [];

  const formatSize = b => {
    if (!b) return '0 KB';
    const u = ['KB','MB','GB'];
    let s = b / 1024, i = 0;
    while (s >= 1024 && i < u.length-1) { s /= 1024; i++; }
    return s.toFixed(1) + ' ' + u[i];
  };

  const render = () => {
    list.innerHTML = '';

    if (!files.length) {
      msg.style.display = '';
      list.classList.add('hidden');
      return;
    }

    msg.style.display = 'none';
    list.classList.remove('hidden');

    files.forEach((file,i)=>{
      const li = document.createElement('li');
      li.className = 'p-3 text-sm bg-background';

      li.innerHTML = `
        <div class="grid grid-cols-[minmax(0,1fr)_auto] items-center gap-2">
          <div class="min-w-0">
            <p class="truncate">${file.name}</p>
            <p class="text-xs text-muted-foreground">${formatSize(file.size)}</p>
          </div>
          <button class="btn btn-delete"></button>
        </div>
      `;

      li.querySelector('button').onclick = ()=>{
        files.splice(i,1);
        render();
      };

      list.appendChild(li);
    });

  };

  const addFiles = f => {
    files.push(...f);
    render();
  };

  input.onchange = e => {
    addFiles([...e.target.files]);
    input.value='';
  };

  zone.ondragover = e=>{
    e.preventDefault();
    zone.classList.add('border-primary-200');
  };

  zone.ondragleave = ()=>{
    zone.classList.remove('border-primary-200');
  };

  zone.ondrop = e=>{
    e.preventDefault();
    zone.classList.remove('border-primary-200');
    addFiles([...e.dataTransfer.files]);
  };
});
</script>
