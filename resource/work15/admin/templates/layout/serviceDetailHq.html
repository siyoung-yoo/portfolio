<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org"
    xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{common/layout/vanilla_default.html}">
<body>
<th:block layout:fragment="header">
  <th:block th:replace="~{common/header :: header-back('', null, ~{::headerAction})}" />
  <th:block th:fragment="headerAction">
    <button type="button" class="btn btn-primary" id="btnAccept" style="display:none;" onclick="openAcceptServiceModal()">접수</button>
  </th:block>
</th:block>

<th:block layout:fragment="main">
  <div class="container-h-full">
    <div class="grid lg:grid-cols-2 gap-3 h-full">

      <!-- 왼쪽: 서비스 신청 정보 -->
      <div class="card card-h-full">
        <div class="card-header">
          <h3 class="card-title">상세 정보</h3>
        </div>
        <div class="card-content overflow-y-auto">
          <div class="grid sm:grid-cols-2 gap-2">
            <div>
              <span class="label">신청번호</span>
              <p class="label-data-text" id="info_REQ_NO"></p>
            </div>
            <div>
              <span class="label">신청일</span>
              <p class="label-data-text" id="info_REQ_DATE"></p>
            </div>
            <div>
              <span class="label">진행상태</span>
              <p class="label-data-text" id="info_STATUS"></p>
            </div>
            <div>
              <span class="label">고객명</span>
              <p class="label-data-text" id="info_CORP_NM"></p>
            </div>
            <div>
              <span class="label">신청자</span>
              <p class="label-data-text" id="info_REQ_USER"></p>
            </div>
            <div>
              <span class="label">영업담당자</span>
              <p class="label-data-text" id="info_MANAGER"></p>
            </div>

            <div>
              <span class="label">실적사업소</span>
              <p class="label-data-text" id=""></p>
            </div>
            <div>
              <span class="label">실적대리점</span>
              <p class="label-data-text" id=""></p>
            </div>

            <div class="sm:col-span-2">
              <span class="label">대리점 배정 요청사유</span>
              <p class="label-data-text" id="">본사 배정일 경우만 대리점 배정 요청사유 영역이 노출됩니다. 사유가 없을 경우 - 만 표기해주세요.</p>
            </div>

            <div class="sm:col-span-2">
              <span class="label">목적</span>
              <p class="label-data-text" id="info_PURPOSE"></p>
            </div>

            <div class="sm:col-span-2">
              <span class="label">도면</span>
              <ul class="mt-1 flex flex-col gap-1" id="info_LAYOUTS"></ul>
            </div>
            <div class="sm:col-span-2">
              <span class="label">내용</span>
              <p class="label-data-text whitespace-pre-wrap" id="info_CONTENT"></p>
            </div>
          </div>
        </div>
      </div>

      <!-- 오른쪽: 작업 결과 -->
      <div class="card card-h-full flex flex-col">
        <div class="card-header">
          <div class="flex justify-between items-center flex-wrap gap-4">
            <h3 class="card-title">작업 결과</h3>
            <button type="button" class="btn btn-outline" id="btnAddAttach" disabled onclick="openAttachUploadModal()">파일 추가</button>
          </div>
        </div>
        <div class="card-content flex-1 overflow-y-auto">
          <ul id="attachFileList" class="flex flex-col gap-2">
            <li class="text-sm text-muted-foreground" id="attachEmptyMsg">등록된 결과 파일이 없습니다.</li>
          </ul>
        </div>
      </div>

    </div>
  </div>

  <!-- 접수 모달 -->
  <th:block th:replace="layout/modal/acceptServiceModal.html"/>
  <!-- 결과 파일 업로드 모달 -->
  <th:block th:replace="layout/modal/attachUploadModal.html"/>
</th:block>

<th:block layout:fragment="script">
  <script th:inline="javascript">
    let attachFiles = [];
    let currentStatus = '';
    let serviceRequestId = '';

    document.addEventListener('DOMContentLoaded', () => {
      loadServiceDetail();
    });

    async function loadServiceDetail() {
      const pathSegments = window.location.pathname.split('/');
      const reqNo = pathSegments[pathSegments.length - 1];

      if (!reqNo) {
        console.error('서비스 신청번호를 찾을 수 없습니다.');
        return;
      }

      try {
        const params = new URLSearchParams({ ojLayoutServiceNumber: reqNo }).toString();
        const response = await fetch('/layout/service/selectServiceRequestDtl.dataTable', {
          method: 'POST',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded; charset=UTF-8' },
          body: params
        });
        const json = await response.json();
        const rows = json?.data;
        if (rows && rows.length > 0) {
          populateFields(rows);
          await loadServiceResultList();
        }
      } catch (error) {
        console.error('서비스 상세 조회 실패:', error);
      }
    }

    function populateFields(rows) {
      const data = rows[0];
      currentStatus = data.SERVICE_STATUS || '';
      serviceRequestId = data.OJ_LAYOUT_SERVICE_REQUEST_ID || '';

      // 헤더 타이틀을 신청명으로 설정
      const headerTitle = document.querySelector('.header .font-medium');
      if (headerTitle) headerTitle.textContent = data.REQ_TITLE || '';

      // 접수 버튼: REQUEST 상태일 때만 표시
      const btnAccept = document.getElementById('btnAccept');
      if (btnAccept) {
        btnAccept.style.display = currentStatus === 'REQUEST' ? '' : 'none';
      }

      // 파일 추가 버튼: 접수 이후(REQUEST가 아닌 상태)에만 활성화
      const btnAddAttach = document.getElementById('btnAddAttach');
      if (btnAddAttach) {
        btnAddAttach.disabled = currentStatus === 'REQUEST';
      }

      // 기본 필드 매핑
      const fieldMap = {
        'REQ_NO': 'info_REQ_NO',
        'REQ_DATE': 'info_REQ_DATE',
        'CTM_NM': 'info_CORP_NM',
        'OJ_NM': 'info_REQ_USER',
        'CEP_NM': 'info_MANAGER',
        'REQUEST_CONTENT': 'info_CONTENT'
      };
      Object.entries(fieldMap).forEach(([key, elId]) => {
        const el = document.getElementById(elId);
        if (el) el.textContent = data[key] || '';
      });

      // 진행상태 badge
      const statusEl = document.getElementById('info_STATUS');
      if (statusEl && data.SERVICE_STATUS) {
        const statusLabelMap = {
          'REQUEST': '신청',
          'ACCEPT': '접수',
          'IN-PROGRESS': '진행',
          'COMPLETE': '완료'
        };
        const badgeMap = {
          'REQUEST': 'badge-default',
          'ACCEPT': 'badge-outline',
          'IN-PROGRESS': 'badge-outline',
          'COMPLETE': 'badge-secondary'
        };
        const label = statusLabelMap[data.SERVICE_STATUS] || data.SERVICE_STATUS;
        const cls = badgeMap[data.SERVICE_STATUS] || 'badge-default';
        statusEl.innerHTML = '<span class="badge badge-rounded ' + cls + '">' + label + '</span>';
      }

      // 목적 (Y/N 컬럼 기반)
      const purposes = [];
      if (data.NEW_SECTION_BUILD_YN === 'Y') purposes.push('신규 공간 구축');
      if (data.OLD_SECTION_CHANGE_YN === 'Y') purposes.push('기존 공간 변경');
      if (data.ETC_YN === 'Y') purposes.push('기타');
      document.getElementById('info_PURPOSE').textContent = purposes.join(', ');

      // 도면 (rows 전체 순회 - LEFT JOIN으로 다중 row)
      const ul = document.getElementById('info_LAYOUTS');
      ul.innerHTML = '';
      const addedFiles = new Set();
      rows.forEach(row => {
        const fileName = row.FLOOR_PLAN_FILE_NM;
        const filePath = row.FLOOR_PLAN_FILE_PATH;
        const memo = row.FLOOR_PLAN_MEMO || '';
        if (fileName && !addedFiles.has(fileName)) {
          addedFiles.add(fileName);
          const li = document.createElement('li');
          li.className = 'flex items-start gap-2 px-3 py-2 border rounded text-sm';
          li.innerHTML =
            '<div class="flex-1 flex flex-col gap-0.5 overflow-hidden">' +
              '<span class="label-data-text overflow-hidden whitespace-nowrap text-ellipsis mb-1">' + fileName + '</span>' +
              (memo ? '<span class="text-muted-foreground">' + memo + '</span>' : '') +
            '</div>' +
            '<button type="button" class="flex-shrink-0 text-xs text-muted-foreground underline cursor-pointer" onclick="downloadLayout(\'' + encodeURIComponent(filePath) + '\', \'' + encodeURIComponent(fileName) + '\')">다운로드</button>';
          ul.appendChild(li);
        }
      });
      if (addedFiles.size === 0) {
        ul.innerHTML = '<li class="text-sm text-muted-foreground">등록된 도면이 없습니다.</li>';
      }
    }

    // === 접수 처리 후 UI 갱신 ===
    function onAccepted() {
      loadServiceDetail();
    }

    // === 작업결과 목록 조회 ===
    async function loadServiceResultList() {
      if (!serviceRequestId) return;

      try {
        const params = new URLSearchParams({ ojLayoutServiceRequestId: serviceRequestId }).toString();
        const response = await fetch('/layout/service/selectServiceResultList.dataTable', {
          method: 'POST',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded; charset=UTF-8' },
          body: params
        });
        const json = await response.json();
        const results = json?.data || [];

        attachFiles = results.map(r => ({
          resultId: r.OJ_LAYOUT_SERVICE_RESULT_ID,
          name: r.FLOOR_PLAN_FILE_NM || '',
          uploadDate: r.FST_SYS_DT || '',
          desc: r.MEMO || ''
        }));
        renderAttachList();
      } catch (error) {
        console.error('작업결과 조회 실패:', error);
      }
    }

    // === 도면 다운로드 ===
    function downloadLayout(filePath, fileName) {
      if (!filePath) return;
      window.location.href = '/layout/service/downloadFloorPlan.do?filePath=' + filePath + '&fileName=' + fileName;
    }

    // === 첨부파일 다운로드 ===
    function downloadAttachFile(resultId) {
      if (!resultId) return;
      window.location.href = '/layout/service/downloadServiceResult.do?ojLayoutServiceResultId=' + encodeURIComponent(resultId);
    }

    // === 첨부파일 삭제 ===
    async function removeAttachFile(index) {
      if (!confirm('삭제하시겠습니까?')) return;

      const item = attachFiles[index];
      if (!item || !item.resultId) return;

      try {
        const response = await fetch('/layout/service/deleteServiceResult.ajax', {
          method: 'POST',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded; charset=UTF-8' },
          body: new URLSearchParams({ ojLayoutServiceResultId: item.resultId }).toString()
        });

        if (response.ok) {
          alert('삭제되었습니다.');
          await loadServiceResultList();
        } else {
          const msg = await response.text();
          alert(msg || '삭제에 실패했습니다.');
        }
      } catch (error) {
        console.error('삭제 실패:', error);
        alert('삭제 중 오류가 발생했습니다.');
      }
    }

    // === 첨부파일 목록 렌더링 ===
    function renderAttachList() {
      const ul = document.getElementById('attachFileList');
      const emptyMsg = document.getElementById('attachEmptyMsg');

      if (attachFiles.length === 0) {
        emptyMsg.style.display = '';
        ul.querySelectorAll('li:not(#attachEmptyMsg)').forEach(li => li.remove());
        return;
      }

      emptyMsg.style.display = 'none';
      ul.querySelectorAll('li:not(#attachEmptyMsg)').forEach(li => li.remove());

      attachFiles.forEach((item, idx) => {
        const li = document.createElement('li');
        li.className = 'flex items-start gap-2 px-3 py-2 border rounded text-sm';
        li.innerHTML =
          '<div class="flex-1 flex flex-col gap-0.5 overflow-hidden">' +
            '<span class="label">' + (item.uploadDate || '') + '</span>' +
            '<span class="label-data-text overflow-hidden whitespace-nowrap text-ellipsis mt-0 mb-2">' + item.name + '</span>' +
            (item.desc ? '<span class="">' + item.desc + '</span>' : '') +
          '</div>' +
          '<div class="flex items-center gap-2 flex-shrink-0">' +
            '<button type="button" class="text-xs text-muted-foreground underline cursor-pointer" onclick="downloadAttachFile(\'' + (item.resultId || '') + '\')">다운로드</button>' +
            '<button type="button" class="text-xs text-muted-foreground underline cursor-pointer" onclick="removeAttachFile(' + idx + ')">삭제</button>' +
          '</div>';
        ul.appendChild(li);
      });
    }
  </script>
</th:block>
</body>
</html>
