<!-- 도면 현황 검색 모달 -->
<div class="modal" id="layoutSearchModal">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">도면 현황 조회</h5>
        <button type="button" class="icon-close modal-close"></button>
      </div>
      <div class="modal-body">
        <div class="grid sm:grid-cols-3 gap-2">
          <div class="input-group sm:col-span-2">
            <label>
              <span class="label">검색</span>
              <input type="text" id="layoutSearchKeyword" class="input" placeholder="도면명 또는 고객사명을 입력하세요">
            </label>
          </div>
          <div class="flex items-end">
            <button type="button" class="btn btn-secondary" id="layoutSearchBtn">검색</button>
          </div>
        </div>
        <div class="mt-3">
          <span class="label">도면 목록</span>
          <div class="mt-2" id="layoutSearchGrid" style="height: 350px;"></div>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-outline modal-close">닫기</button>
        <button type="button" class="btn btn-primary" id="layoutSelectBtn">선택</button>
      </div>
    </div>
  </div>
</div>

<script>
  let layoutSearchGridId = null;
  let selectedLayout = null;

  function openLayoutSearchModal() {
    selectedLayout = null;
    document.getElementById('layoutSearchKeyword').value = '';
    openModal('layoutSearchModal');
    initLayoutSearchGrid();
  }

  function initLayoutSearchGrid() {
    const columnLayout = [
      { headerText: '고객사', dataField: 'CORP_NM', width: 150 },
      { headerText: '주소', dataField: 'ADR4', width: 220 },
      { headerText: '도면명', dataField: 'LAYOUT_NM', width: 180 },
      { headerText: '버전', dataField: 'VERSION_NO', width: 70, style: 'text-center' },
      { headerText: '파일유형', dataField: 'FILE_TYPE', width: 90, style: 'text-center' },
      { headerText: '등록일', dataField: 'REG_DATE', width: 110, style: 'text-center' },
    ];
    const props = {
      enableSorting: true,
      selectionMode: 'singleRow',
      showRowNumColumn: true,
      fillColumnSizeMode: false,
    };
    const result = ensureGrid('#layoutSearchGrid', columnLayout, props, layoutSearchGridId);
    layoutSearchGridId = result.gridId;

    if (result.created) {
      AUIGrid.bind(layoutSearchGridId, 'cellClick', function (e) { selectedLayout = e.item; });
      AUIGrid.bind(layoutSearchGridId, 'cellDoubleClick', function (e) {
        selectedLayout = e.item;
        selectLayout();
      });
    }
  }

  document.addEventListener('click', function (e) {
    if (e.target.id === 'layoutSearchBtn') searchLayouts();
    if (e.target.id === 'layoutSelectBtn') selectLayout();
  });

  async function searchLayouts() {
    const keyword = document.getElementById('layoutSearchKeyword').value.trim();
    if (!keyword) {
      alert('검색어를 입력해주세요.');
      return;
    }

    initLayoutSearchGrid();
    AUIGrid.showAjaxLoader(layoutSearchGridId);

    try {
      const data = await fetchJson('/layout/selectLayoutList.dataTable', 'POST', { keyword });
      AUIGrid.removeAjaxLoader(layoutSearchGridId);
      AUIGrid.setGridData(layoutSearchGridId, data?.data || []);
      selectedLayout = null;
    } catch (error) {
      AUIGrid.removeAjaxLoader(layoutSearchGridId);
      alert('조회 중 오류가 발생했습니다.');
      console.error(error);
    }
  }

  function selectLayout() {
    if (!selectedLayout) {
      alert('도면을 선택해주세요.');
      return;
    }
    addLayoutItem({
      type: 'search',
      name: selectedLayout.LAYOUT_NM + ' (' + selectedLayout.FILE_TYPE + ') - ' + selectedLayout.FILE_NM,
      layoutNo: selectedLayout.LAYOUT_NO,
      filePath: selectedLayout.FILE_PATH,
      fileNm: selectedLayout.FILE_NM
    });
    closeModal('layoutSearchModal');
  }
</script>
