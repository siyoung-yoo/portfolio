<!-- 도면 영역지정 모달 (전체화면) -->
<div class="modal" id="drawAreaModal">
  <div class="modal-dialog" style="width:90vw; max-width:1600px; height:85vh; margin:auto;">
    <div class="modal-content" style="height:100%;">
      <div class="modal-header">
        <div>
          <h5 class="modal-title" id="drawAreaModalTitle">도면 등록</h5>
          <p class="modal-description mt-1" id="drawAreaModalDesc" style="display:none;"></p>
        </div>
        <button type="button" class="icon-close modal-close" onclick="closeDrawAreaModal()"></button>
      </div>
      <div class="modal-body" style="padding:16px 24px; overflow:hidden; flex:1;">

        <div class="draw-panel-layout" style="height:100%; gap:16px;">
          <div class="draw-cont-wrap card" style="border:none; margin:0; position: relative;">

            <ul class="draw-info">
              <li class="inline-flex items-center gap-2"><span class="title">계약건</span>
                <span id="infoContract"></span>
              </li>
              <li>
                <span class="title">도면 공간(층수)</span>
                <span id="infoDrawingName"></span>
              </li>
              <li><span class="title">PDF 도면</span> <span id="infoPdfName"></span></li>
            </ul>

            <div class="draw-controls">
              <div class="input-group makeAreaForm">
                <input type="text" class="input flex-1" placeholder="영역 명을 입력해 주세요 (예: 업무존 A, 회의실)">
                <button type="button" draggable="true" disabled class="btn btn-icon btn-outline"><i class="icon-selection"></i></button>
              </div>

              <div class="scale-box border">
                <button type="button" class="btn btn-icon btn-ghost" onclick="scaleMinus()">
                  <i class="icon-minus"></i>
                </button>
                <span>100%</span>
                <button type="button" class="btn btn-icon btn-ghost" onclick="scalePlus()">
                  <i class="icon-plus"></i>
                </button>
              </div>
            </div>

            <div id="drawCont" class="draw-cont">
              <div class="img-box">
                <canvas id="drawImg" data-img=""></canvas>
              </div>
            </div>

            <th:block th:replace="~{common/fragments/drawLoading :: drawLoading}"/>

          </div>
          <!-- // draw-cont-wrap -->

          <div class="regist-panel-wrap card" style="border:none; margin:0; display:flex; flex-direction:column; overflow:hidden;">
            <div class="alert alert-default" data-state="makeArea">
              <div class="alert-title">영역을 선택하세요</div>
              <div class="alert-description mt-5">좌측에서 영역 명을 입력 후 선택 버튼으로 도면 위에 해당 영역을 지정하세요.</div>
              <div class="alert-description">추가된 영역을 선택 후, 계약품목을 각 영역에 매핑하세요.</div>
            </div>

            <div class="regist-cont-wrap hidden" data-state="makeArea" style="flex-direction:column; flex:1; overflow:hidden;">
              <div class="regist-panel-header">
                <form-dropdown id="dropdownList">
                  <button slot="trigger" class="btn" disabled>
                    영역 선택 <i class="icon-chevron"></i>
                  </button>
                  <ul class="dropdown-menu"></ul>
                </form-dropdown>
              </div>

              <div class="selected-area-panel">
              </div>

              <div class="regist-list-wrap" style="flex:1; overflow-y:auto;">
                <div class="regist-list">
                  <h3 class="title">계약 품목 (<span id="contractCount">0</span>)</h3>
                  <div class="input">
                    <input type="text" id="contractItemSearch" class="w-full" placeholder="코드·품목·색상 검색">
                    <button type="button"><i class="icon-search"></i></button>
                  </div>

                  <ul class="mapping-list type-contract" id="contractItemList">
                  </ul>
                </div>

                <div class="regist-list">
                  <h3 class="title">매핑 품목 (<span id="mappingCount">0/0</span>)</h3>

                  <div class="alert alert-default" data-state="mappingItem">
                    <p class="alert-title text-sm">매핑할 계약 품목을<br>선택해주세요</p>
                  </div>

                  <div class="mapping-list-wrap hidden" data-state="mappingItem">
                  </div>
                </div>
              </div>

              <div class="flex justify-end gap-2" style="flex-shrink:0; padding-top:12px;">
                <button type="button" class="btn btn-outline" onclick="closeDrawAreaModal()">취소</button>
                <button type="button" class="btn btn-primary" id="drawAreaSaveBtn" onclick="drawInfoSave()">저장</button>
              </div>
            </div>
          </div>
          <!-- regist-panel-wrap -->
        </div>

      </div>
    </div>
  </div>
</div>
