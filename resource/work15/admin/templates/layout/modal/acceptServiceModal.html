<!-- 접수 모달 -->
<div class="modal" id="acceptServiceModal">
  <div class="modal-dialog modal-md">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">서비스 접수</h5>
        <button type="button" class="icon-close modal-close"></button>
      </div>
      <div class="modal-body">
        <div class="input-group">
          <label>
            <span class="label required">영업담당자</span>
            <form-select>
              <select id="acceptCepCd">
                <option value="">선택</option>
                <option th:each="agent : ${salesAgntList}" th:value="${agent.CEP_CD}" th:text="${agent.CEP_NM}"></option>
              </select>
            </form-select>
          </label>
        </div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-outline modal-close">취소</button>
        <button type="button" class="btn btn-primary" onclick="acceptService()">접수</button>
      </div>
    </div>
  </div>
</div>

<script>
  function openAcceptServiceModal() {
    document.getElementById('acceptCepCd').value = '';
    openModal('acceptServiceModal');
  }

  async function acceptService() {
    const cepCdEl = document.getElementById('acceptCepCd');
    const cepCd = cepCdEl.value;
    if (!cepCd) {
      alert('영업담당자를 선택하세요.');
      return;
    }
    const cepNm = cepCdEl.options[cepCdEl.selectedIndex].text;

    if (!confirm('접수하시겠습니까?')) return;

    const pathSegments = window.location.pathname.split('/');
    const reqNo = pathSegments[pathSegments.length - 1];

    try {
      const response = await fetch('/layout/service/acceptService.ajax', {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded; charset=UTF-8' },
        body: new URLSearchParams({ ojLayoutServiceNumber: reqNo, cepCd: cepCd, cepNm: cepNm }).toString()
      });

      if (response.ok) {
        alert('접수되었습니다.');
        closeModal('acceptServiceModal');
        onAccepted();
      } else {
        const msg = await response.text();
        alert(msg || '접수 처리에 실패했습니다.');
      }
    } catch (error) {
      console.error('접수 처리 실패:', error);
      alert('접수 처리 중 오류가 발생했습니다.');
    }
  }
</script>
