<div class="modal" id="orderChgQtyModal">
  <div class="modal-dialog modal-xxl">
    <div class="modal-content">
      <div class="modal-header">
        <h3 class="modal-title">납기 분할</h3>
        <button type="button" class="icon-close modal-close"></button>
      </div>

      <div class="modal-body">
        <div class="border">
          <div id="chgQtyGrid1" class="w-full h-full"></div>
        </div>

        <div class="mt-10">
          <h5 class="card-title">착불 진행여부</h5>
          <div class="flex items-center gap-5 flex-wrap mt-3">
            <label class="radio-box">
              <input type="radio" name="radioA" class="radio" checked />
              아니오
            </label>
            <label class="radio-box">
              <input type="radio" name="radioA" class="radio" />
              예 <span class="text-sm font-medium">(착불가능 처리 시 배차비용 대리점 부담)</span>
            </label>
          </div>
        </div>

        <div class="mt-6">
          <div class="flex flex-wrap gap-2">
            <h5 class="card-title mr-2">변경요청 사유</h5>
            <span class="text-red-indent font-medium">* 처리 여부에 참고되는 내용입니다. 가급적 자세히 기술해 주시기 바랍니다.</span>
          </div>
          <div class="mt-3">
            <textarea name="" id="" class="textarea input"></textarea>
          </div>
        </div>
      </div>

      <div class="modal-footer">
        <button type="button" class="btn btn-outline modal-close">닫기</button>
        <button type="button" class="btn btn-primary">수주 변경요청</button>
      </div>
    </div>
  </div>
</div>

<script>
  // 수량 검증
  function validateQty(value, min, max) {
    if (value < min) {
      alert(`최소 수량은 ${min}개 입니다.`);
      return min;
    }

    if (value > max) {
      alert(`최대 수량은 ${max}개 입니다.`);
      return max;
    }

    return value;
  }

  // row 수량 정보 가져오기
  function getQtyInfo(rowIndex) {
    const item = AUIGrid.getItemByRowIndex(chgQtyGrid1, rowIndex);
    if (!item) return null;

    return {
      currentValue: parseInt(item.TEMP_DATA10, 10) || 1,
      maxQty: parseInt(item.TEMP_DATA11, 10) || 1
    };
  }

  // 수량 변경 공통 처리
  function changeQty(rowIndex, newValue) {
    const info = getQtyInfo(rowIndex);
    if (!info) return;

    const validValue = validateQty(newValue, 1, info.maxQty);
    if (validValue === info.currentValue) return;

    updateQty(rowIndex, validValue);
  }


  // 수량변경 minus 버튼
  function chgQtyMinus(rowIndex, value, e) {
    e.stopPropagation();

    const info = getQtyInfo(rowIndex);
    if (!info) return;

    changeQty(rowIndex, info.currentValue - 1);
  }


  // 수량변경 plus 버튼
  function chgQtyPlus(rowIndex, value, e) {
    e.stopPropagation();

    const info = getQtyInfo(rowIndex);
    if (!info) return;
    changeQty(rowIndex, info.currentValue + 1);
  }


  // 수량변경 input 직접 입력
  function handleQtyInput(rowIndex, el) {
    let inputValue = el.value.replace(/[^0-9]/g, "");
    let newValue = parseInt(inputValue, 10) || 0;

    const info = getQtyInfo(rowIndex);
    if (!info) return;

    const validValue = validateQty(newValue, 1, info.maxQty);
    el.value = validValue;
    if (validValue !== info.currentValue) {
      changeQty(rowIndex, validValue);
    }
  }


  // grid 데이터 업데이트
  function updateQty(rowIndex, newValue) {
    AUIGrid.updateRow(
      chgQtyGrid1,
      {
        TEMP_DATA10: newValue,
        TEMP_DATA12: newValue
      },
      rowIndex
    );
  }


  // grid renderer로 생성된 datepicker는 window resize 시 동작이 사라져서
  // grid 생성 후 input append 및 datepicker 초기화함
  function initDatepicker() {
    const tbody = document.querySelector("#chgQtyGrid1 .aui-grid-body-panel tbody");
    tbody.querySelectorAll("tr").forEach((row, index) => {
      const cell = row.children[12];
      if (cell.querySelector(".datepicker-basic")) return;

      const newDatepicker = document.createElement("input");
      newDatepicker.type = "text";
      newDatepicker.name = "";
      newDatepicker.id = "";
      newDatepicker.classList.add("input", "datepicker-basic");

      cell.appendChild(newDatepicker)
    })

    tbody.querySelectorAll(".datepicker-basic").forEach((el) => {
      if (el.datepicker) return;

      el.datepicker = new AirDatepicker(el, {
        isMobile: window.innerWidth < 768,
        autoClose: true,
        dateFormat: "yyyy.MM.dd",
        firstDay: 0,
        selectedDates: new Date()
      });
    });
  }


  // grid setting
  let chgQtyGrid1;

  function create_chgQtyGrid1() {
    const chgQtyGridProps = {
      isRowAllCheckCurrentView: true,
      enableSorting: true,
      enableFilter: true,
      useContextMenu: true,
      hoverMode: "singleRow",
      selectionMode: "none",
      showRowNumColumn: true,
      showRowCheckColumn: false,
      defaultColumnWidth: 100,
      softRemoveRowMode: false,
      enableMovingColumn: true,

      groupingFields: [ "TEMP_DATA03", "TEMP_DATA05", "TEMP_DATA10", "TEMP_DATA13", "TEMP_DATA01", "TEMP_DATA02", ],
      keepColumnOrderOnGrouping: true, // columnLayout에서 정의한 순서 유지
      enableCellMerge: true,           // 그룹핑 후 셀 병합
      cellMergeRowSpan: false,         // rowspan 적용 여부
      showBranchOnGrouping: false,     // 브랜치에 해당되는 행 출력 여부
      showEditedCellMarker: false,     // 셀을 수정하면 수정된 표시(마크)를 출력할지 여부
    }

    const columnLayout = [
      { headerText: "분류", dataField: "TEMP_DATA01", filter: filter, width: 75, style: 'text-center', },
      { headerText: "그룹", dataField: "TEMP_DATA02", filter: filter, width: 75, style: 'text-center', },
      { headerText: "좌수", dataField: "TEMP_DATA03", filter: filter, width: 75, style: 'text-center', },
      { headerText: "순번", dataField: "TEMP_DATA04", filter: filter, width: 75, style: 'text-center', },
      { headerText: "세트코드", dataField: "TEMP_DATA05", filter: filter, width: 120, },
      { headerText: "색상", dataField: "TEMP_DATA06", filter: filter, width: 100, style: 'text-center', },
      { headerText: "단품코드", dataField: "TEMP_DATA07", filter: filter, width: 120, },
      { headerText: "색상", dataField: "TEMP_DATA08", filter: filter, width: 100, style: 'text-center', },
      { headerText: "품목", dataField: "TEMP_DATA09", filter: filter, width: 250, },
      { headerText: "수량변경", dataField: "TEMP_DATA10", width: 100, style: 'text-center p-0',
        renderer: renderer,
        labelFunction: function (rowIndex, columnIndex, value, headerText, item, dataField, cItem) {
          return `<div class="flex items-center gap-1 px-1">
                    <button type="button" class="btn btn-icon" onclick="chgQtyMinus(${rowIndex}, ${value}, event)">
                      <i class="icon-chevron rotate-90"></i>
                    </button>
                    <input type="text" name="" id="" class="input text-center p-0" value="${value}" onchange="handleQtyInput(${rowIndex}, this)">
                    <button type="button" class="btn btn-icon" onclick="chgQtyPlus(${rowIndex}, ${value}, event)">
                      <i class="icon-chevron rotate-270"></i>
                    </button>
                  </div>`;
        }
      },
      { headerText: '<span class="inline-flex">수량<br/>(단품)</span>', dataField: "TEMP_DATA11", filter: filter, width: 100, style: 'text-center', },
      { headerText: '<span class="inline-flex">변경수량<br/>(단품)</span>', dataField: "TEMP_DATA12", width: 100, style: 'text-center',},
      { headerText: "변경납기일", dataField: "TEMP_DATA13", filter: filter, width: 150, style: 'text-center',},
    ];

    const tempData = [
      { "TEMP_DATA01": "", "TEMP_DATA02": "", "TEMP_DATA03": "001", "TEMP_DATA04": "001", "TEMP_DATA05": "SD0014S", "TEMP_DATA06": "CC", "TEMP_DATA07": "SD0014S", "TEMP_DATA08": "CC", "TEMP_DATA09": "품목1", "TEMP_DATA11": "1", },
      { "TEMP_DATA01": "", "TEMP_DATA02": "", "TEMP_DATA03": "002", "TEMP_DATA04": "001", "TEMP_DATA05": "SD366L", "TEMP_DATA06": "BE", "TEMP_DATA07": "SD0301L", "TEMP_DATA08": "MM", "TEMP_DATA09": "L형 데스트 측판", "TEMP_DATA11": "10", },
      { "TEMP_DATA01": "", "TEMP_DATA02": "", "TEMP_DATA03": "002", "TEMP_DATA04": "002", "TEMP_DATA05": "SD366L", "TEMP_DATA06": "BE", "TEMP_DATA07": "SD0366B", "TEMP_DATA08": "MM", "TEMP_DATA09": "L형 데스트 뒷가림판", "TEMP_DATA11": "10", },
      { "TEMP_DATA01": "", "TEMP_DATA02": "", "TEMP_DATA03": "002", "TEMP_DATA04": "003", "TEMP_DATA05": "SD366L", "TEMP_DATA06": "BE", "TEMP_DATA07": "SD0366L", "TEMP_DATA08": "BE", "TEMP_DATA09": "L형 데스트 상판", "TEMP_DATA11": "10", },
    ]

    // 수량변경, 변경수량(단품) 초기 값 세팅
    tempData.forEach(row => {
      row.TEMP_DATA10 = 1;
      row.TEMP_DATA12 = 1;
    });

    chgQtyGrid1 = AUIGrid.create("#chgQtyGrid1", columnLayout, chgQtyGridProps);
    AUIGrid.setGridData(chgQtyGrid1, tempData);
  }


  // 모달 열릴 때 그리드 초기화
  document.addEventListener('modalOpened', function(e) {
    if (e.detail.modalId === 'orderChgQtyModal') {
      create_chgQtyGrid1();
      initDatepicker();
    }
  });
</script>
