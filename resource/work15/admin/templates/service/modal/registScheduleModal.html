<!-- Modal: 예정일정 등록 -->
<div class="modal" id="registScheduleModal">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <div>
          <h3 class="modal-title">케어 일정 등록</h3>
          <p class="modal-description mt-2">케어 예정일과 케어 담당자를 등록해주세요.</p>
        </div>
        <button type="button" class="icon-close modal-close"></button>
      </div>

      <div class="modal-body">
        <div class="grid grid-cols-2 gap-3">
          <div class="input-group">
            <span class="label">예정일</span>
            <input id="schedInputDate" type="text" class="input datepicker-today" placeholder="YYYY-MM-DD">
            <p class="text-red-indent mt-2">* 마감 기한을 초과해도 입력할 수 있습니다.</p>
          </div>

          <div class="input-group">
            <span class="label">담당자</span>
            <div class="grid gap-2">
              <form-select>
                <select id="schedInputAgent">
                  <option value="">선택</option>
                </select>
              </form-select>
            </div>
          </div>
        </div>

        <!-- 이전 회차 케어 결과 요약
             데이터 소스: RBO_OFFICECARE_REPORT_MASTER (특별조치/현장개선)
                       + RBO_OFFICECARE_REPORT_DETAIL (전체/양호/관리/AS 카운트)
             테이블 정의(추후) 후 API 연동 시 #prevReportXxx id 채울 것 -->
        <div class="card mt-6 overflow-hidden" id="prevReportCard">
          <div class="card-header py-4 bg-background">
            <div class="flex items-center justify-between">
              <p class="card-title">이전 회차 케어 결과 요약</p>
              <p class="card-description" id="prevReportSeqDate">-</p>
            </div>
          </div>

          <div class="px-4 py-2 border-t border-b">
            <div class="flex items-center gap-x-4 gap-y-2 flex-wrap" id="prevReportAreaBadges">
              <!-- JS 렌더링: 영역별 배지 -->
            </div>
          </div>

          <div class="card-content py-6">
            <div class="grid gap-2">
              <div class="card-title">* 가구 특별 조치사항</div>
              <div class="text-sm mt-2" id="prevReportFurnitureFix" style="white-space: pre-wrap;">-</div>

              <div class="separator-horizontal my-2"></div>

              <div class="card-title">* 현장 개선사항</div>
              <div class="text-sm mt-2" id="prevReportImprovement" style="white-space: pre-wrap;">-</div>
            </div>
          </div>
        </div>
      </div>

      <div class="modal-footer">
        <button type="button" class="btn btn-outline modal-close">취소</button>
        <button type="button" class="btn btn-primary" onclick="saveSchedule()">저장</button>
      </div>
    </div>
  </div>
</div>

<script>
let _schedCtx = null;

function openRegistScheduleModal(ctx) {
  _schedCtx = ctx;

  // 예정일 input 리셋 + 수정 모드 기존 값 반영 (AirDatepicker 인스턴스 동기화 필수)
  const dateInput = document.getElementById('schedInputDate');

  // minDate: 직전 회차 마감기한+1일 (회차 시작일). 1회차/값 없음이면 미적용
  const minRaw = String(ctx.minRequestDate || '').replace(/[^0-9]/g, '');
  if (dateInput.datepicker?.update && /^\d{8}$/.test(minRaw)) {
    const minDt = new Date(Number(minRaw.slice(0,4)), Number(minRaw.slice(4,6)) - 1, Number(minRaw.slice(6,8)));
    dateInput.datepicker.update({ minDate: minDt });
  } else if (dateInput.datepicker?.update) {
    dateInput.datepicker.update({ minDate: '' });
  }

  const d = String(ctx.careRequestDate || '').replace(/[^0-9]/g, '');
  if (/^\d{8}$/.test(d)) {
    const dt = new Date(Number(d.slice(0,4)), Number(d.slice(4,6)) - 1, Number(d.slice(6,8)));
    if (dateInput.datepicker?.selectDate) {
      dateInput.datepicker.selectDate(dt);
    } else {
      dateInput.value = `${d.slice(0,4)}-${d.slice(4,6)}-${d.slice(6,8)}`;
    }
  } else {
    if (dateInput.datepicker?.clear) {
      dateInput.datepicker.clear();
    } else {
      dateInput.value = '';
    }
  }

  // 담당자 목록 조회
  LoadingManager.inc();
  $.ajax({
    url: '/careDist/getAgentList',
    type: 'post',
    complete: function() { LoadingManager.dec(); },
    success: function(res) {
      const list = res.data || [];
      const sel = document.getElementById('schedInputAgent');
      sel.innerHTML = '<option value="">선택</option>';
      list.forEach(u => {
        const opt = document.createElement('option');
        opt.value = u.uIdx != null ? String(u.uIdx) : '';   // U_IDX (INT) — DB CARE_AGENT_ID/U_IDX 매칭
        opt.dataset.uId   = u.uId   || '';
        opt.dataset.uName = u.uName || '';
        opt.textContent   = u.uName || '';
        sel.appendChild(opt);
      });
      // 수정 모드면 기존 담당자 선택
      const initUIdx = ctx.uIdx ? String(ctx.uIdx) : '';
      sel.value = initUIdx;

      // form-select(custom element) 내부 옵션 재수집 + 표시값 셋팅
      const formSelectEl = sel.closest('form-select');
      const inst = formSelectEl?.querySelector('.custom-select')?._instance;
      if (inst) {
        inst.collectOptions();
        inst.renderOptions();
        inst.setValue(initUIdx);
      }
    }
  });

  // 이전 회차 케어 결과 요약 조회
  loadPreviousReport(ctx);

  openModal('registScheduleModal');
}

function loadPreviousReport(ctx) {
  // 1회차이면 이전 결과 자체가 없으므로 카드 숨김
  if (!ctx || !ctx.officecareSeq || Number(ctx.officecareSeq) <= 1) {
    resetPreviousReport();
    return;
  }
  resetPreviousReport();

  LoadingManager.inc();
  $.ajax({
    url: '/careDist/getPreviousReport',
    type: 'post',
    data: {
      conIdx:        ctx.conIdx,
      mIdx:          ctx.mIdx,
      estaIdx:       ctx.estaIdx,
      officecareSeq: ctx.officecareSeq
    },
    complete: function() { LoadingManager.dec(); },
    success: function(res) {
      const p = res.data?.prev;
      const card = document.getElementById('prevReportCard');
      if (!p || p.prevSeq == null) {
        // 이전 회차 케어 완료 건 없음 → 영역 자체 숨김
        if (card) card.style.display = 'none';
        return;
      }
      if (card) card.style.display = '';
      // 회차/완료일
      const finalDt = p.finalDt ? String(p.finalDt).slice(0, 10) : '-';
      document.getElementById('prevReportSeqDate').textContent = `${p.prevSeq}회차 | 완료일 ${finalDt}`;
      // 도면(층)별 배지 — 그 도면의 영역 품목 중 한 품목이라도 '이상'이면 이슈, 모두 '양호'면 양호
      const badgesWrap = document.getElementById('prevReportAreaBadges');
      const drawings = Array.isArray(p.areas) ? p.areas : [];
      if (drawings.length === 0) {
        badgesWrap.innerHTML = '<span class="text-sm text-primary-300">도면 정보가 없습니다.</span>';
      } else {
        badgesWrap.innerHTML = drawings.map(d => {
          const isIssue = d.issueYn === 'Y';
          const cls = isIssue ? 'badge-orange' : 'badge-blue';
          const txt = isIssue ? '이슈' : '양호';
          const name = (d.drawingName || '-').replace(/[&<>"']/g,
            c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
          return `<span class="badge ${cls}">${name} - ${txt}</span>`;
        }).join('');
      }
      // 텍스트
      document.getElementById('prevReportFurnitureFix').textContent = p.furnitureFix || '-';
      document.getElementById('prevReportImprovement').textContent  = p.improvement  || '-';
    },
    error: function() { resetPreviousReport(); }
  });
}

function resetPreviousReport() {
  // 모달 열 때 잔여 표시 제거 — 데이터 없으면 카드 숨김
  const card = document.getElementById('prevReportCard');
  if (card) card.style.display = 'none';
}

function saveSchedule() {
  if (!_schedCtx) return;
  const dateRaw = document.getElementById('schedInputDate').value || '';
  const agentSel = document.getElementById('schedInputAgent');
  const uIdx  = agentSel.value;
  const uName = agentSel.options[agentSel.selectedIndex]?.dataset.uName || '';

  if (!dateRaw) { alert('예정일을 선택해주세요.'); return; }
  if (!uIdx)    { alert('담당자를 선택해주세요.'); return; }

  // CARE_REQRUEST_DATE 컬럼이 VARCHAR(8) 이라 YYYYMMDD 8자만 허용
  const dateClean = dateRaw.replace(/[^0-9]/g, '').slice(0, 8);

  // 과거일 차단 (datepicker minDate 우회 입력 대응)
  const today = new Date();
  const todayStr = `${today.getFullYear()}${String(today.getMonth() + 1).padStart(2, '0')}${String(today.getDate()).padStart(2, '0')}`;
  if (dateClean < todayStr) {
    alert('과거 날짜는 선택할 수 없습니다.');
    return;
  }
  // 직전 회차 마감기한+1일 이전 차단 (datepicker minDate 우회 입력 대응)
  const minRaw = String(_schedCtx.minRequestDate || '').replace(/[^0-9]/g, '');
  if (/^\d{8}$/.test(minRaw) && dateClean < minRaw) {
    const f = `${minRaw.slice(0,4)}-${minRaw.slice(4,6)}-${minRaw.slice(6,8)}`;
    alert(`${f} 이후 날짜를 선택해주세요.`);
    return;
  }

  LoadingManager.inc();
  $.ajax({
    url: '/careDist/saveSchedule',
    type: 'post',
    data: {
      conIdx:           _schedCtx.conIdx,
      mIdx:             _schedCtx.mIdx,
      estaIdx:          _schedCtx.estaIdx,
      officecareSeq:    _schedCtx.officecareSeq,
      careRequestDate:  dateClean,
      uIdx:             uIdx,
      uName:            uName
    },
    complete: function() { LoadingManager.dec(); },
    success: function() {
      closeModal('registScheduleModal');
      if (typeof reloadAfterScheduleSave === 'function') reloadAfterScheduleSave();
    }
  });
}
</script>
