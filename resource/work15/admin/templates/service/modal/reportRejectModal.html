<!-- Modal: 반려 사유 등록 (오피스케어 본사) -->
<div class="modal" id="reportRejectModal">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <div>
          <h3 class="modal-title">반려 사유 등록</h3>
          <p class="modal-description mt-2">케어 리포트 승인을 반려하시려면 사유를 등록해주세요.</p>
        </div>
        <button type="button" class="icon-close modal-close"></button>
      </div>

      <div class="modal-body">
        <div class="input-group w-full">
          <span class="label">반려 사유</span>
          <textarea id="rejectRemark" class="textarea input" rows="5" placeholder="반려 사유를 입력해주세요."></textarea>
        </div>
      </div>

      <div class="modal-footer">
        <button type="button" class="btn btn-outline modal-close">취소</button>
        <button type="button" class="btn btn-primary" onclick="submitRejectReport()">저장</button>
      </div>
    </div>
  </div>
</div>
