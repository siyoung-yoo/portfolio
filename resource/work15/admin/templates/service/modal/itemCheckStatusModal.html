              </td>
              <td>

                  <label class="custom-chk">
                    <input type="radio" name="statusBBB" data-type="good"/>
                    <span class="text">양호</span>

      <div class="modal-footer">

        <button type="button" class="btn btn-primary" onclick="saveItemCheckStatus()">저장</button>

<script>
const table = document.querySelector("#itemTable");
const allChkBox = document.querySelector("#itemsChk");

/* 품목 상태 전체 확인 버튼 — 모든 행에 dispatchEvent 전파하여 행별 핸들러가
   (해제 시) 라디오 캐시/해제, (체크 시) 캐시 복원 또는 양호 자동 선택 처리하도록 위임 */
allChkBox.addEventListener("change", () => {
  const isChecked = allChkBox.checked;

  const rows = table.querySelectorAll('tr[data-itemcode]');
  rows.forEach(row => {
    const checkbox = row.querySelector('input[type="checkbox"]:not([data-type])');
    if (!checkbox || checkbox.checked === isChecked) return;
    checkbox.checked = isChecked;
    checkbox.dispatchEvent(new Event('change', { bubbles: true }));
  });

  syncItemsCheckButton();
});

/* 전체 확인 버튼 상태 동기화 */
function syncItemsCheckButton() {
  const checks = table.querySelectorAll(
    'input[type="checkbox"]:not([data-type])'
  );

  const checked = table.querySelectorAll(
    'input[type="checkbox"]:not([data-type]):checked'
  );

  // 🔥 class가 아니라 checked로
  allChkBox.checked = checks.length === checked.length;
}

/* 첫번째 셀 클릭 시 체크박스 토글 */
table.addEventListener('click', (e) => {
  const cell = e.target.closest('td');
  if (!cell) return;

  const row = cell.closest('tr:not(.sub-tr)');
  if (!row) return;

  if (cell !== row.children[0]) return;

  const checkbox = cell.querySelector('input[type="checkbox"]');
  if (!checkbox) return;

  checkbox.checked = !checkbox.checked;
  checkbox.dispatchEvent(new Event('change', { bubbles: true }));
});



/* 체크 시 기본 상태값 (양호) — 해제 시에는 자동 선택 금지 */
document.addEventListener('change', (e) => {
  const checkbox = e.target;

  if (!checkbox.matches('input[type="checkbox"]:not([data-type])')) return;

  const row = checkbox.closest('tr');
  if (!row) return;

  syncItemsCheckButton();
  if (checkbox.checked) syncDefaultStatus(row);
});

function syncDefaultStatus(row) {
  const statusRadios = row.querySelectorAll(
    '.custom-chk input[type="radio"][data-type]'
  );

  const checkedRadio = [...statusRadios].find(radio => radio.checked);

  if (!checkedRadio) {
    const goodRadio = row.querySelector(
      '.custom-chk input[data-type="good"]'
    );

    if (goodRadio) {
      goodRadio.checked = true;
      goodRadio.dispatchEvent(new Event('change', { bubbles: true }));
    }
  }
}

/* 상태 선택 시 */
document.addEventListener('change', (e) => {
  const radio = e.target;

  if (!radio.matches('.custom-chk input[type="radio"]')) return;

  const row = radio.closest('tr');
  const itemCode = row.dataset.itemcode;
  const status = radio.dataset.type;

  const rowCheckbox = row.querySelector('.custom-chk.dark input');
  if (rowCheckbox) rowCheckbox.checked = true;

  const subRow = document.querySelector(`.sub-tr[data-itemcode="${itemCode}"]`);
  subRow.classList.remove('is-open');
  if (status === 'issue') subRow.classList.add('is-open')
});

/* 관리, as 선택 */
document.addEventListener('change', (e) => {
  const checkbox = e.target;

  if (!checkbox.matches('.custom-chk input[type="checkbox"]')) return;

  const row = checkbox.closest('.sub-tr');
  if (!row) return;

  const type = checkbox.dataset.type;

  if (type === 'care') {
    row.querySelector('.care-wrap')
      ?.classList.toggle('hidden', !checkbox.checked);
  }

  if (type === 'as') {
    row.querySelector('.as-wrap')
      ?.classList.toggle('hidden', !checkbox.checked);
  }
});
</script>
