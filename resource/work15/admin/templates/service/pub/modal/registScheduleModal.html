<div class="modal" id="registScheduleModalPub">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <div>
          <h3 class="modal-title">케어 일정 등록</h3>
          <p class="modal-description mt-2">케어 예정일과 케어 담당자를 등록해주세요.</p>
        </div>
        <button type="button" class="icon-close modal-close"></button>
      </div>

      <div class="modal-body">

        <div class="grid grid-cols-2 gap-3">
          <div class="input-group">
            <span class="label">예정일</span>
            <input type="text" class="input datepicker-basic" placeholder="YYYY-MM-DD">
            <p class="text-red-indent mt-2">* 마감 기한을 초과해도 입력할 수 있습니다.</p>
          </div>

          <div class="input-group">
            <span class="label">담당자</span>
            <div class="grid gap-2">
              <form-select>
                <select>
                  <option value="1">가나다</option>
                  <option value="2">홍길동</option>
                </select>
              </form-select>
            </div>
          </div>
        </div>

        <div class="card mt-6 overflow-hidden"><!-- [2026-05-15] overflow-hidden 추가-->
          <div class="card-header py-4 bg-background"><!-- [2026-05-15] bg-background 추가-->
            <div class="flex items-center justify-between">
              <p class="card-title">이전 회차 케어 결과 요약</p>
              <p class="card-description">6회차 | 완료일 2026-01-01</p>
            </div>
          </div>

          <!-- [2026-05-15] 요약정보 표기방식 변경 -->
          <div class="px-4 py-2 border-t border-b">
            <div class="flex items-center gap-x-4 gap-y-2 flex-wrap">
              <span class="badge badge-blue">4F 공간 - 양호</span>
              <span class="flex badge badge-blue">5F 회의실 - 양호</span>
              <span class="flex badge badge-orange">6F - 이슈</span>
              <span class="flex badge badge-blue">공간명 - 양호</span>
              <span class="flex badge badge-orange">공간명 - 이슈</span>
            </div>
          </div>
          <!-- // [2026-05-15] 요약정보 표기방식 변경 -->

          <div class="card-content py-6">
            <div class="grid gap-2">
              <div class="card-title">* 가구 특별 조치사항</div>
              <div class="text-sm mt-2">이전 회차에서 입력된 가구 특별 조치사항 텍스트</div>

              <div class="separator-horizontal my-2"></div>

              <div class="card-title">* 현장 개선사항</div>
              <div class="text-sm mt-2">-</div>
            </div>
          </div>
        </div>
      </div>

      <div class="modal-footer">
        <button type="button" class="btn btn-outline modal-close">취소</button>
        <button type="button" class="btn btn-primary">저장</button>
      </div>
    </div>
  </div>
</div>
